# Cloudflare Worker: phục vụ web tĩnh (dist/) + API server + database D1 dùng chung
name = "kingsmen-app-seeding"
main = "worker/index.js"
compatibility_date = "2025-06-01"

# Web tĩnh
[assets]
directory = "./dist"
binding = "ASSETS"

# Database dùng chung (SQLite serverless)
[[d1_databases]]
binding = "DB"
database_name = "appseedingkingsmen-db"
database_id = "184ebc6a-ebf2-451d-89ea-369501c25f02"

# Kho lưu ảnh/video Sales tải lên app (Quay công trình)
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "kingsmen-media"

# Cron: mỗi ngày dọn media của công trình chưa duyệt quá 30 ngày
[triggers]
crons = ["0 18 * * *"]
