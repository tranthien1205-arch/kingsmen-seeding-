function download(filename, text, mime='text/csv;charset=utf-8'){
  const blob = new Blob(['﻿'+text], {type:mime}); // BOM để Excel đọc UTF-8
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function toCSV(rows){
  return rows.map(r=>r.map(c=>{
    let s = c==null? '' : String(c);
    if(/[",\n]/.test(s)) s='"'+s.replace(/"/g,'""')+'"';
    return s;
  }).join(',')).join('\n');
}
// Nén ảnh phía client trước khi lưu (resize max cạnh 1100px, jpeg 0.7)
function compressImage(file, maxSide=1100, quality=0.7){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w, height:h}=img;
        if(Math.max(w,h)>maxSide){ const k=maxSide/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg', quality));
      };
      img.onerror=reject; img.src=e.target.result;
    };
    r.onerror=reject; r.readAsDataURL(file);
  });
}

function buildFilmTemplate(ten, he_san_pham, checklist){
  const phases=[]; let po=1;
  for(const [pname, shots] of checklist){
    const phase={ id:uid('ph'), ten:pname, thu_tu:po++, shots:[] }; let so=1;
    for(const [t,mo_ta,bb] of shots) phase.shots.push({ id:uid('sh'), ten:t, mo_ta, source_mau_url:'https://youtu.be/dQw4w9WgXcQ', bat_buoc:bb, thu_tu:so++, active:true });
    phases.push(phase);
  }
  return { id:uid('tpl'), ten, he_san_pham, active:true, phases };
}
const filmCountShots = t => t.phases.reduce((s,ph)=>s+ph.shots.filter(x=>x.active).length,0);

const filmFindTpl = (db,id) => (db.filming_templates||[]).find(t=>t.id===id) || (db.filming_templates||[])[0];
const uniqShots = ups => [...new Set((ups||[]).map(u=>u.shot_id))];
// đơn giá 1 cảnh: giá riêng của cảnh (nếu có) hoặc giá chung
const filmShotPrice = (shot, pricing) => (shot && shot.don_gia!=null) ? Number(shot.don_gia) : (Number(pricing&&pricing.don_gia_canh)||0);
// tiền công trình = tổng giá các cảnh ĐẠT (cảnh đạt nếu còn ≥1 source đạt), mỗi cảnh 1 lần
function filmProjectTien(project, template, pricing){
  if(!template) return 0;
  const okShots = new Set((project.uploads||[]).filter(u=>u.dat_item===true).map(u=>u.shot_id));
  let t=0; template.phases.forEach(ph=>ph.shots.forEach(s=>{ if(s.active && okShots.has(s.id)) t+=filmShotPrice(s,pricing); })); return t;
}

/* ============================================================
   3. LƯU BỀN + MIGRATE
============================================================ */
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return seedDB();
    let db = JSON.parse(raw);
    db = migrate(db);
    return db;
  }catch(e){ console.error('loadDB lỗi, khởi tạo mới', e); return seedDB(); }
}
function migrate(db){
  if(!db.version){ db.version = SCHEMA_VERSION; }
  // đảm bảo đủ mảng (dữ liệu cũ thiếu field không crash)
  db.users ||= []; db.groups ||= []; db.content_topics ||= []; db.cmt_suggestions ||= [];
  db.post_seedings ||= []; db.cmt_seedings ||= []; db.payouts ||= []; db.audit ||= [];
  db.pricing ||= { don_gia_post:15000, don_gia_cmt:3000, min_nhac_kingsmen:6, min_usp:2 };
  db.post_seedings.forEach(p=>{ p.react ??= 0; p.so_cmt_seeding ??= 0; p.so_cmt_tu_nhien ??= 0; p.thanh_tien ??= 0; });
  db.cmt_seedings.forEach(c=>{ c.proofs ||= []; c.so_cmt_seeding ??= 0; c.react ??= 0; c.so_cmt_tu_nhien ??= 0; c.thanh_tien ??= 0; });
  db.groups.forEach(g=>{ g.uu_tien ??= false; });
  db.content_topics.forEach(t=>{ t.uu_tien ??= false; });
  db.users.forEach(u=>{ u.password ??= '123456'; u.active ??= true; });
  return db;
}
function saveDB(db){
  try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); return true; }
  catch(e){
    console.error(e);
    alert('Không lưu được (bộ nhớ trình duyệt đầy — thường do quá nhiều ảnh). Hãy xoá bớt bản ghi cũ hoặc xuất Excel rồi reset.');
    return false;
  }
}

function tienPost(pricing){ return Number(pricing.don_gia_post)||0; }
function tienCmt(pricing, soCmt){ return (Number(soCmt)||0) * (Number(pricing.don_gia_cmt)||0); }

      headers: { 'Content-Type':'application/json', ...(token?{'Authorization':'Bearer '+token}:{}) },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || ('Lỗi '+res.status));
    return data;
  };

    return ()=>{ alive=false; };
  }, [token]);

  };

    reviewFilming: (id, result, reason, ratings) => mut(`/filming/projects/${id}/review`, {method:'POST', body:{result, reason, ratings}}),
    deleteUpload: id => mut(`/filming/uploads/${id}`, {method:'DELETE'}),
    cleanupMedia: () => mut('/filming/cleanup', {method:'POST'}),
    upsertGuide: (key, g) => mut('/guides/'+key, {method:'PATCH', body:g}),
    uploadMedia: (file, onProgress) => new Promise((resolve,reject)=>{
      const xhr = new XMLHttpRequest();
      xhr.open('POST', API_BASE+'/api/filming/upload?type='+encodeURIComponent(file.type||''));
      if(token) xhr.setRequestHeader('Authorization','Bearer '+token);
      xhr.setRequestHeader('Content-Type', file.type||'application/octet-stream');
      xhr.timeout = 15*60*1000;
      xhr.upload.onprogress = (e)=>{ if(onProgress && e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100), e.loaded, e.total); };
      xhr.onload = ()=>{ let d={}; try{ d=JSON.parse(xhr.responseText); }catch(_){} if(xhr.status>=200&&xhr.status<300) resolve(d); else reject(new Error(d.error||('Lỗi '+xhr.status))); };
      xhr.onerror = ()=> reject(new Error('Lỗi mạng khi tải lên'));
      xhr.ontimeout = ()=> reject(new Error('Hết thời gian tải lên — thử lại hoặc dùng link Drive'));
      xhr.send(file);
    }),
  };
  return <AppCtx.Provider value={api}>
    {children}
    {toast && <Toast toast={toast}/>}
  </AppCtx.Provider>;

/* ============================================================
   6. UI CƠ BẢN
============================================================ */
function Toast({toast}){
  const c = toast.type==='err' ? 'bg-rose-600' : toast.type==='warn' ? 'bg-amber-500' : 'bg-emerald-600';
  return <div className={"fixed bottom-5 left-1/2 -translate-x-1/2 z-50 text-white px-4 py-2.5 rounded-xl shadow-lift text-sm max-w-[90%] font-medium "+c}>{toast.msg}</div>;
}
function Badge({st}){ return <span className={"inline-block px-2 py-0.5 rounded-full text-xs font-medium "+(ST_STYLE[st]||'bg-slate-100')}>{ST_LABEL[st]||st}</span>; }
function PriBadge({small}){ return <span className={"inline-flex items-center gap-0.5 rounded-full font-semibold bg-brand/15 text-brand-dark "+(small?'text-[9px] px-1.5 py-0.5':'text-[10px] px-2 py-0.5')}>⭐ Ưu tiên</span>; }
const sortPri = (arr) => [...arr].sort((a,b)=> (b.uu_tien?1:0)-(a.uu_tien?1:0));
function PriSwitch({value, onChange, hint}){
  return <div className="mb-3 flex items-center justify-between p-3 rounded-xl border border-slate-200 bg-slate-50">
    <div><div className="text-xs font-semibold text-slate-700">⭐ Ưu tiên seeding</div>
      <div className="text-[11px] text-slate-400">{hint||'Yêu cầu Sales seeding mục này trước'}</div></div>
    <button type="button" onClick={()=>onChange(!value)}
      className={"w-12 h-7 rounded-full transition relative "+(value?'bg-brand':'bg-slate-300')}>
      <span className={"absolute top-0.5 w-6 h-6 bg-white rounded-full shadow transition-all "+(value?'left-[22px]':'left-0.5')}></span>
    </button>
  </div>;
}
function Btn({children, onClick, variant='primary', className='', type='button', disabled}){
  const v = {
    primary:'bg-ink text-white hover:bg-ink-soft',
    brand:'bg-brand text-white hover:bg-brand-dark shadow-brand',
    ghost:'bg-white border border-line text-ink hover:border-brand hover:text-brand-dark',
    danger:'bg-rose-600 text-white hover:bg-rose-700',
    ok:'bg-emerald-600 text-white hover:bg-emerald-700',
    soft:'bg-brand-bg text-brand-dark hover:bg-brand-light/60',
  }[variant];
  return <button type={type} disabled={disabled} onClick={onClick}
    className={"px-3.5 py-2.5 rounded-xl text-sm font-semibold transition active:scale-[.98] disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100 "+v+" "+className}>{children}</button>;
}
function Field({label, children, hint, required}){
  return <label className="block mb-3">
    <div className="text-[13px] font-semibold text-ink mb-1.5">{label}{required && <span className="text-rose-500"> *</span>}</div>
    {children}
    {hint && <div className="text-[11px] text-ink-muted mt-1">{hint}</div>}
  </label>;
}
const inputCls = "w-full px-3.5 py-2.5 rounded-xl border border-line text-sm text-ink placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-brand/15 focus:border-brand bg-white transition";
function Input(p){ return <input {...p} className={inputCls+" "+(p.className||'')}/>; }
function Textarea(p){ return <textarea {...p} className={inputCls+" "+(p.className||'')}/>; }
function Select({children, ...p}){ return <select {...p} className={inputCls+" "+(p.className||'')}>{children}</select>; }

function Modal({open, onClose, title, children, wide}){
  if(!open) return null;
  return <div className="fixed inset-0 z-40 bg-ink/50 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} className={"bg-white w-full rounded-t-3xl sm:rounded-2xl shadow-lift max-h-[92vh] overflow-auto "+(wide?'sm:max-w-3xl':'sm:max-w-lg')}>
      <div className="sticky top-0 bg-white/95 backdrop-blur border-b border-line px-4 py-3 flex items-center justify-between z-10">
        <h3 className="font-display font-700 text-ink">{title}</h3>
        <button onClick={onClose} className="w-8 h-8 rounded-lg text-ink-muted hover:bg-slate-100 text-xl leading-none">×</button>
      </div>
      <div className="p-4">{children}</div>
    </div>
  </div>;
}
function Empty({children}){ return <div className="text-center text-ink-muted text-sm py-10">{children}</div>; }
function Stat({label, value, sub, color='text-ink'}){
  return <div className="bg-white rounded-2xl p-4 shadow-card border border-line">
    <div className="text-[13px] text-ink-muted">{label}</div>
    <div className={"font-display text-xl font-800 mt-1 "+color}>{value}</div>
    {sub && <div className="text-[11px] text-ink-muted mt-0.5">{sub}</div>}
  </div>;
}
function Tabs({tabs, active, onChange}){
  return <div className="flex gap-1 bg-slate-100 p-1 rounded-xl overflow-x-auto">
    {tabs.map(t=><button key={t.key} onClick={()=>onChange(t.key)}
      className={"px-3 py-1.5 rounded-lg text-sm font-semibold whitespace-nowrap transition "+(active===t.key?'bg-white shadow-card text-ink':'text-ink-muted hover:text-ink')}>
      {t.label}{t.count!=null && <span className={"ml-1.5 text-xs px-1.5 rounded-full "+(active===t.key?'bg-brand text-white':'bg-slate-200 text-slate-500')}>{t.count}</span>}
    </button>)}
  </div>;
}
function Toggle({on, onClick, labels=['Hiện','Ẩn']}){
  return <button onClick={onClick} className={"px-2.5 py-1 rounded-lg text-xs font-semibold "+(on?'bg-emerald-50 text-emerald-700':'bg-slate-100 text-slate-500')}>
    {on?labels[0]:labels[1]}
  </button>;
}

function ProfileModal({open, onClose}){
  const { me, updateProfile, notify } = useApp();
  const [name, setName] = useState('');
  const [pw, setPw] = useState('');
  const [busy, setBusy] = useState(false);
  useEffect(()=>{ if(open){ setName(me.ho_ten); setPw(''); } }, [open]);
  if(!open) return null;
  const save = async () => {
    if(!name.trim()) return notify('Nhập tên hiển thị','warn');
    setBusy(true);
    const ok = await updateProfile({ ho_ten:name.trim(), ...(pw?{password:pw}:{}) });
    setBusy(false);
    if(ok){ notify('Đã cập nhật hồ sơ'); onClose(); }
  };
  return <Modal open={open} onClose={onClose} title="Hồ sơ của tôi">
    <Field label="Tên hiển thị" required hint="Tên này hiện trong báo cáo & hàng chờ duyệt">
      <Input value={name} onChange={e=>setName(e.target.value)}/></Field>
    <Field label="Email (đăng nhập)"><Input value={me.email} disabled/></Field>
    <Field label="Đổi mật khẩu" hint="Để trống nếu không đổi">
      <Input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Mật khẩu mới"/></Field>
    <div className="flex gap-2 mt-2"><Btn variant="ghost" onClick={onClose}>Huỷ</Btn><Btn variant="brand" className="flex-1" onClick={save} disabled={busy}>{busy?'Đang lưu…':'Lưu'}</Btn></div>
  </Modal>;
}

function useMyItems(){
  const { db, meId } = useApp();
  const posts = db.post_seedings.filter(p=>p.sales_id===meId);
  const cmts  = db.cmt_seedings.filter(c=>c.sales_id===meId);
  return { posts, cmts };
}
function SalesHome({go}){
  const { db, meId } = useApp();
  const { posts, cmts } = useMyItems();
  const filmings = (db.project_filmings||[]).filter(p=>p.sales_id===meId);
  const all = [...posts, ...cmts, ...filmings];
  const cho = all.filter(x=>x.trang_thai===ST.CHO_DUYET).length;
  const loai = all.filter(x=>x.trang_thai===ST.KHONG_DAT).length;
  const tienDat = all.filter(x=>x.trang_thai===ST.DAT).reduce((s,x)=>s+(x.thanh_tien||0),0);
  const tienChi = all.filter(x=>x.trang_thai===ST.DA_CHI).reduce((s,x)=>s+(x.thanh_tien||0),0);
  // tổng hợp theo loại công việc
  const sumBy = (arr)=>({ dat: arr.filter(x=>x.trang_thai===ST.DAT).reduce((s,x)=>s+(x.thanh_tien||0),0), chi: arr.filter(x=>x.trang_thai===ST.DA_CHI).reduce((s,x)=>s+(x.thanh_tien||0),0), cho: arr.filter(x=>x.trang_thai===ST.CHO_DUYET).length });
  const gP=sumBy(posts), gC=sumBy(cmts), gQ=sumBy(filmings);

  return <div className="space-y-4">
    <div className="grid grid-cols-2 gap-3">
      <Stat label="Đang chờ duyệt" value={cho} color="text-amber-600"/>
      <Stat label="Bị loại (sửa lại)" value={loai} color="text-rose-600"/>
      <Stat label="Thu nhập đã Đạt" value={fmtVND(tienDat)} color="text-emerald-600" sub="POST + CMT + QUAY · chưa chi"/>
      <Stat label="Đã được chi" value={fmtVND(tienChi)} color="text-indigo-600"/>
    </div>

    {/* tổng hợp 3 mảng công việc */}
    <div className="bg-white rounded-2xl border border-line shadow-card overflow-hidden">
      <div className="px-4 py-2 border-b bg-slate-50 text-xs font-semibold text-slate-500">Tổng hợp công việc của tôi</div>
      <div className="grid grid-cols-3 divide-x text-center">
        {[['📝 POST',gP,posts.length],['💬 CMT',gC,cmts.length],['🎥 QUAY',gQ,filmings.length]].map(([lb,g,n])=>
          <div key={lb} className="p-3">
            <div className="text-xs text-slate-500">{lb}</div>
            <div className="text-sm font-bold text-emerald-600 mt-1">{fmtVND(g.dat)}</div>
            <div className="text-[10px] text-slate-400 mt-0.5">{n} mục · {g.cho} chờ duyệt</div>
          </div>)}
      </div>
    </div>

    <div className="grid grid-cols-3 gap-3">
      <button onClick={()=>go('new_post')} className="bg-ink text-white rounded-2xl p-3 text-left hover:bg-ink-soft transition">
        <div className="text-xl">📝</div><div className="font-semibold text-sm mt-1">Tạo POST</div></button>
      <button onClick={()=>go('new_cmt')} className="bg-brand text-white rounded-2xl p-3 text-left hover:bg-brand-dark transition">
        <div className="text-xl">💬</div><div className="font-semibold text-sm mt-1">Tạo CMT</div></button>
      <button onClick={()=>go('filming')} className="bg-ink-soft text-white rounded-2xl p-3 text-left hover:bg-ink transition">
        <div className="text-xl">🎥</div><div className="font-semibold text-sm mt-1">Quay CT</div></button>
    </div>

    {loai>0 && <div className="bg-rose-50 border border-rose-200 rounded-2xl p-3">
      <div className="text-sm font-semibold text-rose-700 mb-2">⚠️ {loai} việc bị loại — cần sửa & gửi lại</div>
      <div className="space-y-1.5">
        {all.filter(x=>x.trang_thai===ST.KHONG_DAT).map(x=>
          <div key={x.id} className="text-xs bg-white rounded-lg p-2 flex justify-between">
            <span className="text-slate-600 truncate">{x.ten_cong_trinh||x.link_bai||x.post_link||CMT_LOAI_LABEL[x.loai]}</span>
            <span className="text-rose-500 ml-2 shrink-0">{x.ly_do_loai}</span>
          </div>)}
      </div>
    </div>}

    <RecentList posts={posts} cmts={cmts} filmings={filmings}/>
  </div>;
}
function RecentList({posts, cmts, filmings=[]}){
  const { db } = useApp();
  const rows = [
    ...posts.map(p=>({ ...p, kind:'POST', when:p.created_at, label:'POST · '+(db.content_topics.find(t=>t.id===p.topic_id)?.chu_de||'—') })),

function CopyBtn({text, className='', label='📋 Copy'}){
  const { notify } = useApp();
  const [done, setDone] = useState(false);
  const copy = () => {
    const ok = navigator.clipboard?.writeText(text);
    // fallback cho file:// / trình duyệt cũ
    if(!navigator.clipboard){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); }
    setDone(true); notify('Đã copy nội dung'); setTimeout(()=>setDone(false), 2000);
  };
  return <Btn variant={done?'ok':'soft'} className={className} onClick={copy}>{done?'✓ Đã copy':label}</Btn>;
}

function inRange(iso, from, to){
  if(!iso) return false; const d=iso.slice(0,10);
  if(from && d<from) return false; if(to && d>to) return false; return true;
}

function BreakdownCard({title, data}){
  const entries = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(1, ...entries.map(e=>e[1]));
  return <div className="bg-white rounded-2xl border border-line shadow-card p-4">
    <div className="text-sm font-semibold text-ink mb-3">{title}</div>
    {entries.length===0 ? <Empty>Chưa có dữ liệu.</Empty> :
      <div className="space-y-2">{entries.map(([k,v])=>
        <div key={k}>
          <div className="flex justify-between text-xs mb-0.5"><span className="text-slate-600">{k}</span><span className="font-semibold">{v}</span></div>
          <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-brand rounded-full" style={{width:(v/max*100)+'%'}}/></div>
        </div>)}
      </div>}
  </div>;
}

// Bóc tách bảng CSV/TSV: tự nhận dấu phân tách (tab khi dán từ Excel, phẩy khi mở file .csv),
// hỗ trợ ô có dấu ngoặc kép chứa phẩy/xuống dòng theo chuẩn CSV.
function parseTable(text){
  text = (text||'').replace(/^﻿/,'').replace(/\r\n?/g,'\n');
  const firstLine = text.split('\n').find(l=>l.trim()) || '';
  const delim = firstLine.includes('\t') ? '\t' : ',';
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else q=false; }
      else cur+=ch;
    } else if(ch==='"'){ q=true; }
    else if(ch===delim){ row.push(cur); cur=''; }
    else if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
    else cur+=ch;
  }
  if(cur!=='' || row.length){ row.push(cur); rows.push(row); }
  return rows.map(r=>r.map(c=>c.trim())).filter(r=>r.some(c=>c!==''));
}
// Import từ file mẫu (.csv) hoặc dán trực tiếp từ Excel
function ImportBtn({tab}){
  const { upsertGroup, upsertTopic, upsertCmt, notify } = useApp();
  const [open, setOpen] = useState(false);
  const [txt, setTxt] = useState('');
  const fileRef = useRef(null);
  const tpl = IMPORT_TPL[tab];
  const upsert = { groups:upsertGroup, topics:upsertTopic, cmts:upsertCmt }[tab];

  const downloadTpl = () => download('mau_'+tab+'.csv', toCSV([tpl.headers, tpl.sample]));

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if(!file){ return; }
    const r = new FileReader();
    r.onload = ev => setTxt(String(ev.target.result||''));
    r.onerror = () => notify('Không đọc được file','warn');
    r.readAsText(file, 'utf-8');
    e.target.value = '';
  };

  const doImport = async () => {
    const rows = parseTable(txt);
    if(!rows.length) return notify('Chưa có dữ liệu để import','warn');
    // Bỏ dòng tiêu đề nếu ô đầu trùng với tên cột mẫu
    const firstCell = (rows[0][0]||'').toLowerCase();
    if(firstCell === tpl.headers[0].toLowerCase()) rows.shift();
    let n=0, skip=0;
    for(const c of rows){
      if(!(c[0]||'').trim()){ skip++; continue; }
      await upsert(tpl.make(c));
      n++;
    }
    notify('Đã import '+n+' dòng'+(skip?' (bỏ qua '+skip+' dòng thiếu cột đầu)':''));
    setTxt(''); setOpen(false);
  };

  return <>
    <Btn variant="ghost" onClick={()=>setOpen(true)}>⬇ Import file</Btn>
    <Modal open={open} onClose={()=>setOpen(false)} title={'Import '+tpl.label} wide>
      <ol className="text-sm text-slate-600 list-decimal ml-4 space-y-1 mb-3">
        <li>Bấm <b>Tải file mẫu</b> → mở bằng Excel/Google Sheets.</li>
        <li>Điền thông tin theo các cột (giữ nguyên dòng tiêu đề), lưu lại dạng <b>.csv</b>.</li>
        <li>Bấm <b>Chọn file</b> để tải lên, xem trước rồi bấm <b>Import</b> để cập nhật danh sách.</li>
      </ol>
      <div className="flex flex-wrap gap-2 mb-3">
        <Btn variant="ghost" onClick={downloadTpl}>⬇ Tải file mẫu</Btn>
        <Btn variant="ghost" onClick={()=>fileRef.current && fileRef.current.click()}>📄 Chọn file (.csv)</Btn>
        <input ref={fileRef} type="file" accept=".csv,.tsv,.txt,text/csv" className="hidden" onChange={onFile}/>
      </div>
      <div className="text-xs font-mono bg-slate-100 rounded-lg p-2 mb-1 overflow-x-auto whitespace-nowrap">{tpl.headers.join(' | ')}</div>
      <p className="text-[11px] text-slate-400 mb-2">{tpl.note}</p>
      <p className="text-xs text-slate-500 mb-1">Hoặc copy các cột từ Excel rồi dán trực tiếp vào ô dưới (mỗi dòng 1 mục):</p>
      <Textarea rows="7" value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Nội dung file sẽ hiện ở đây sau khi chọn file, hoặc dán dữ liệu từ Excel…"/>
      <div className="flex gap-2 mt-3"><Btn variant="ghost" onClick={()=>setOpen(false)}>Huỷ</Btn><Btn variant="brand" className="flex-1" onClick={doImport}>Import</Btn></div>
    </Modal>
  </>;
}

function MktQueue(){

  const cmtMine   = db.cmt_seedings.filter(c=>c.trang_thai===ST.CHO_DUYET && c.loai===CMT_LOAI.MINH_DANG);
  const cmtDao    = db.cmt_seedings.filter(c=>c.trang_thai===ST.CHO_DUYET && c.loai===CMT_LOAI.DAO);

  const approve = async (item) => {
    const ok = item._t==='post' ? await reviewPost(item.id, ST.DAT) : await reviewCmtSeed(item.id, ST.DAT);

  const reject = async () => {

    const item = rejFor;

    if(ok){ notify('Đã trả về Sales sửa'); setRejFor(null); setRejTxt(''); }
  };

  const curItems = (tab==='post'?postItems.map(x=>({...x,_t:'post'})):tab==='mine'?cmtMine.map(x=>({...x,_t:'cmt'})):cmtDao.map(x=>({...x,_t:'cmt'})));
  const selIds = Object.keys(sel).filter(k=>sel[k]);
  const bulkApprove = async () => {
    for(const i of curItems.filter(i=>sel[i.id])) await approve(i);
    setSel({});
  };

  return <div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <h2 className="font-display text-lg font-bold text-ink">✅ Hàng chờ nghiệm thu</h2>
      {selIds.length>0 && <Btn variant="ok" onClick={bulkApprove}>Duyệt {selIds.length} mục đã chọn</Btn>}
    </div>
    <Tabs active={tab} onChange={t=>{setTab(t);setSel({});}} tabs={[
      {key:'post', label:'POST', count:postItems.length},
      {key:'mine', label:'CMT mình đăng', count:cmtMine.length},
      {key:'dao', label:'CMT dạo', count:cmtDao.length},

          onCheck={()=>setSel(s=>({...s,[item.id]:!s[item.id]}))}
          onApprove={()=>approve(item)} onReject={()=>{setRejFor(item);setRejTxt('');}}/>)}
      </div>}

    <Modal open={!!rejFor} onClose={()=>setRejFor(null)} title="Lý do không đạt">
      <Field label="Nhập lý do (bắt buộc)" required><Textarea rows="3" value={rejTxt} onChange={e=>setRejTxt(e.target.value)} placeholder="VD: thiếu ảnh, sai group, link hỏng…"/></Field>

function QueueCard({item, checked, onCheck, onApprove, onReject}){
  const { db } = useApp();
  const sales = db.users.find(u=>u.id===item.sales_id);
  const topic = item._t==='post' ? db.content_topics.find(t=>t.id===item.topic_id) : null;
  const group = item._t==='post' ? db.groups.find(g=>g.id===item.group_id) : null;
  const sug = item.suggestion_id ? db.cmt_suggestions.find(s=>s.id===item.suggestion_id) : null;
  const tien = item._t==='post' ? tienPost(db.pricing) : tienCmt(db.pricing, item.so_cmt_seeding);
  const link = item._t==='post' ? item.link_bai : item.post_link;

  return <div className="bg-white rounded-2xl border border-line shadow-card p-4">
    <div className="flex items-start gap-3">
      <input type="checkbox" checked={checked} onChange={onCheck} className="mt-1 w-4 h-4 accent-emerald-600"/>
      <div className="flex-1 min-w-0">
        <div className="flex items-center justify-between gap-2">
          <div className="text-sm font-semibold text-ink">{sales?.ho_ten||'—'}</div>
          <div className="text-xs text-slate-400">{fmtDate(item.created_at)}</div>
        </div>
        {topic && <div className="text-sm text-slate-700 mt-1">{topic.chu_de} <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">{topic.loai_bai}</span></div>}
        {group && <div className="text-xs text-slate-500">Group: {group.ten_group}</div>}
        {sug && <div className="text-xs text-slate-500 mt-0.5">Gợi ý: "{sug.noi_dung_goi_y.slice(0,60)}…"</div>}
        {link && <div className="text-xs mt-1 truncate"><a href={link} target="_blank" className="text-blue-500 underline">🔗 {link}</a></div>}
        <div className="flex gap-3 text-xs text-slate-500 mt-1">
          {item._t==='post' && <span>👍 {item.react} · 💬 {item.so_cmt_seeding} seed · {item.so_cmt_tu_nhien} tự nhiên</span>}
          {item._t==='cmt' && <span>💬 {item.so_cmt_seeding} cmt · 👍 {item.react}</span>}
        </div>
        {item.proofs && item.proofs.length>0 && <div className="flex gap-2 mt-2 flex-wrap">
          {item.proofs.map(p=><a key={p.id} href={p.image_url} target="_blank"><img src={p.image_url} className="w-16 h-16 object-cover rounded-lg border"/></a>)}
        </div>}
        <div className="flex items-center justify-between mt-3">
          <span className="text-xs text-slate-400">Nếu Đạt: <b className="text-emerald-600">{fmtVND(tien)}</b></span>
          <div className="flex gap-2">
            <Btn variant="danger" onClick={onReject}>Không đạt</Btn>
            <Btn variant="ok" onClick={onApprove}>Đạt ✓</Btn>
          </div>
        </div>
      </div>
    </div>
  </div>;
}

function allRows(db){
  const posts = db.post_seedings.map(p=>({
    ...p, _t:'POST',
    sales: db.users.find(u=>u.id===p.sales_id)?.ho_ten||'—',
    chu_de: db.content_topics.find(t=>t.id===p.topic_id)?.chu_de||'—',
    loai_bai: db.content_topics.find(t=>t.id===p.topic_id)?.loai_bai||'—',
    group: db.groups.find(g=>g.id===p.group_id)?.ten_group||'—',
    link: p.link_bai,
  }));
  const cmts = db.cmt_seedings.map(c=>({
    ...c, _t: c.loai===CMT_LOAI.MINH_DANG?'CMT_MINE':'CMT_DAO',
    sales: db.users.find(u=>u.id===c.sales_id)?.ho_ten||'—',
    sug: db.cmt_suggestions.find(s=>s.id===c.suggestion_id)?.noi_dung_goi_y||'—',
    link: c.post_link,
  }));
  return { posts, cmts };
}
function MktPayReport(){
  const { db } = useApp();
  const [tab, setTab] = useState('post');
  const [from, setFrom] = useState(''); const [to, setTo] = useState('');
  const [fSales, setFSales] = useState(''); const [fSt, setFSt] = useState('');
  const { posts, cmts } = allRows(db);
  const flt = r => inRangeOrAll(r.created_at,from,to) && (!fSales||r.sales_id===fSales) && (!fSt||r.trang_thai===fSt);
  function inRangeOrAll(iso,f,t){ if(!f&&!t) return true; return inRange(iso,f,t); }

  const exportCSV = () => {
    let rows, name;
    if(tab==='post'){ name='POST_SEEDING';
      rows=[['Ngày','Sales','Chủ đề','Loại bài','Group','Link','React','Cmt seeding','Cmt tự nhiên','Trạng thái','Thành tiền']];
      posts.filter(flt).forEach(r=>rows.push([fmtDay(r.created_at),r.sales,r.chu_de,r.loai_bai,r.group,r.link,r.react,r.so_cmt_seeding,r.so_cmt_tu_nhien,ST_LABEL[r.trang_thai],r.thanh_tien]));
    } else { const isMine=tab==='mine'; name=isMine?'CMT_MINH_DANG':'CMT_DAO';
      rows=[['Ngày','Sales','Link post','Gợi ý cmt','Số cmt','Số ảnh','Trạng thái','Thành tiền']];
      cmts.filter(c=> (isMine? c.loai===CMT_LOAI.MINH_DANG : c.loai===CMT_LOAI.DAO)).filter(flt).forEach(r=>rows.push([fmtDay(r.created_at),r.sales,r.link,r.sug,r.so_cmt_seeding,(r.proofs||[]).length,ST_LABEL[r.trang_thai],r.thanh_tien]));
    }
    download(name+'.csv', toCSV(rows));
  };

  return <div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <h2 className="font-display text-lg font-bold text-ink">📄 Báo cáo thanh toán</h2>
      <Btn variant="brand" onClick={exportCSV}>⬆ Xuất Excel</Btn>
    </div>
    <div className="bg-white rounded-2xl border border-line shadow-card p-3 flex flex-wrap gap-2 items-center">
      <DateRange from={from} to={to} setFrom={setFrom} setTo={setTo}/>
      <Select value={fSales} onChange={e=>setFSales(e.target.value)} className="max-w-[180px]"><option value="">Mọi Sales</option>{db.users.filter(u=>u.vai_tro===ROLES.SALES).map(u=><option key={u.id} value={u.id}>{u.ho_ten}</option>)}</Select>
      <Select value={fSt} onChange={e=>setFSt(e.target.value)} className="max-w-[160px]"><option value="">Mọi trạng thái</option>{Object.keys(ST_LABEL).map(s=><option key={s} value={s}>{ST_LABEL[s]}</option>)}</Select>
    </div>
    <Tabs active={tab} onChange={setTab} tabs={[{key:'post',label:'POST'},{key:'mine',label:'CMT mình đăng'},{key:'dao',label:'CMT dạo'}]}/>

    <div className="bg-white rounded-2xl border border-line shadow-card overflow-auto">
      <table className="w-full text-sm min-w-[720px]">
        <thead className="bg-slate-50/70 text-[11px] font-semibold uppercase tracking-wide text-ink-muted text-left">
          {tab==='post' ? <tr><Th>Ngày</Th><Th>Sales</Th><Th>Chủ đề</Th><Th>Loại bài</Th><Th>Group</Th><Th>Link</Th><Th r>React</Th><Th r>Cmt</Th><Th>Trạng thái</Th><Th r>Thành tiền</Th></tr>
            : <tr><Th>Ngày</Th><Th>Sales</Th><Th>Link post</Th><Th>Gợi ý cmt</Th><Th r>Số cmt</Th><Th>Ảnh</Th><Th>Trạng thái</Th><Th r>Thành tiền</Th></tr>}
        </thead>
        <tbody className="divide-y">
          {tab==='post' ? posts.filter(flt).sort(byDateDesc).map(r=><tr key={r.id} className="hover:bg-slate-50">
            <Td>{fmtDay(r.created_at)}</Td><Td>{r.sales}</Td><Td>{r.chu_de}</Td><Td>{r.loai_bai}</Td><Td>{r.group}</Td>
            <Td>{r.link?<a href={r.link} target="_blank" className="text-blue-500 underline">link</a>:'—'}</Td>
            <Td r>{r.react}</Td><Td r>{r.so_cmt_seeding}</Td><Td><Badge st={r.trang_thai}/></Td><Td r><b>{r.thanh_tien?fmtVND(r.thanh_tien):'—'}</b></Td>
          </tr>) : cmts.filter(c=>tab==='mine'?c.loai===CMT_LOAI.MINH_DANG:c.loai===CMT_LOAI.DAO).filter(flt).sort(byDateDesc).map(r=><tr key={r.id} className="hover:bg-slate-50">
            <Td>{fmtDay(r.created_at)}</Td><Td>{r.sales}</Td>
            <Td>{r.link?<a href={r.link} target="_blank" className="text-blue-500 underline">link</a>:'—'}</Td>
            <Td className="max-w-[220px] truncate">{r.sug}</Td><Td r>{r.so_cmt_seeding}</Td>
            <Td>{(r.proofs||[]).length? <span className="flex gap-1">{r.proofs.slice(0,3).map(p=><a key={p.id} href={p.image_url} target="_blank"><img src={p.image_url} className="w-8 h-8 object-cover rounded"/></a>)}</span> : '—'}</Td>
            <Td><Badge st={r.trang_thai}/></Td><Td r><b>{r.thanh_tien?fmtVND(r.thanh_tien):'—'}</b></Td>
          </tr>)}
        </tbody>
      </table>
      {((tab==='post'?posts.filter(flt):cmts.filter(c=>tab==='mine'?c.loai===CMT_LOAI.MINH_DANG:c.loai===CMT_LOAI.DAO).filter(flt)).length===0) && <Empty>Không có dữ liệu.</Empty>}
    </div>
  </div>;
}
const byDateDesc = (a,b)=>(b.created_at||'').localeCompare(a.created_at||'');
function Th({children, r}){ return <th className={"px-3 py-2.5 whitespace-nowrap "+(r?'text-right':'')}>{children}</th>; }
function Td({children, r, className=''}){ return <td className={"px-3 py-2.5 text-ink "+(r?'text-right':'')+' '+className}>{children}</td>; }

============================================================ */
function UserManagement(){
  const { db, me, createUser, updateUser, deleteUser, notify } = useApp();
  const [edit, setEdit] = useState(null);
  const blank = {ho_ten:'',email:'',password:'123456',vai_tro:ROLES.SALES,active:true};

  const activeMkt = db.users.filter(u=>u.active && u.vai_tro===ROLES.MARKETING).length;

  const setActive = (u, on) => {
    if(!on && u.id===me.id) return notify('Không thể tự tắt tài khoản của mình','warn');
    if(!on && u.vai_tro===ROLES.MARKETING && activeMkt<=1) return notify('Phải còn ít nhất 1 Marketing đang hoạt động','warn');
    updateUser(u.id, {active:on});
  };
  const setRole = (u, role) => {
    if(u.id===me.id && role!==ROLES.MARKETING && u.vai_tro===ROLES.MARKETING && activeMkt<=1) return notify('Phải còn ít nhất 1 Marketing','warn');
    updateUser(u.id, {vai_tro:role});
  };
  const remove = async (u) => {
    if(u.id===me.id) return notify('Không thể xoá tài khoản của mình','warn');
    if(u.vai_tro===ROLES.MARKETING && activeMkt<=1) return notify('Phải còn ít nhất 1 Marketing','warn');
    if(!confirm('Xoá tài khoản '+u.ho_ten+'?')) return;
    if(await deleteUser(u.id)) notify('Đã xoá');
  };
  const save = async () => {
    if(!edit.ho_ten) return notify('Nhập họ tên','warn');
    const key=(edit.email||'').trim().toLowerCase();
    if(!key) return notify('Nhập email','warn');
    if(!edit.id && !edit.password) return notify('Nhập mật khẩu','warn');
    let ok;
    if(edit.id) ok = await updateUser(edit.id, {ho_ten:edit.ho_ten, vai_tro:edit.vai_tro, active:edit.active, ...(edit.password?{password:edit.password}:{})});
    else ok = await createUser({ho_ten:edit.ho_ten, email:key, password:edit.password, vai_tro:edit.vai_tro, active:edit.active});
    if(ok){ notify(edit.id?'Đã lưu':'Đã tạo tài khoản'); setEdit(null); }
  };

  return <div className="space-y-4">
    <div className="flex items-center justify-between">
      <h2 className="font-display text-lg font-bold text-ink">👥 Quản lý tài khoản</h2>
      <Btn variant="brand" onClick={()=>setEdit({...blank})}>＋ Tạo tài khoản</Btn>
    </div>
    <div className="bg-brand/10 border border-brand/30 rounded-2xl p-3 text-xs text-brand-dark">
      Marketing tạo & cấp tài khoản cho Sales và Kế toán — gửi <b>email + mật khẩu</b> để họ đăng nhập. Họ không tự đăng ký.
    </div>

    <div className="bg-white rounded-2xl border border-line shadow-card divide-y">
      {db.users.map(u=><div key={u.id} className={"p-3 flex items-center gap-3 "+(u.active?'':'opacity-50')}>
        <div className="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600">{u.ho_ten[0]}</div>
        <div className="flex-1 min-w-0">
          <div className="text-sm font-medium text-ink truncate">{u.ho_ten}{u.id===me.id && <span className="text-[10px] text-slate-400"> (bạn)</span>}</div>
          <div className="text-xs text-slate-400 truncate">{u.email}</div>
        </div>
        <Select value={u.vai_tro} onChange={e=>setRole(u,e.target.value)} className="max-w-[130px] py-1 text-xs">
          {Object.values(ROLES).map(r=><option key={r} value={r}>{ROLE_LABEL[r]}</option>)}
        </Select>
        <Toggle on={u.active} onClick={()=>setActive(u,!u.active)} labels={['Bật','Tắt']}/>
        <button onClick={()=>setEdit(u)} className="text-xs text-blue-500 hover:underline">Sửa</button>
        <button onClick={()=>remove(u)} className="text-xs text-rose-500 hover:underline">Xoá</button>
      </div>)}
    </div>

    <Modal open={!!edit} onClose={()=>setEdit(null)} title={edit&&edit.id?'Sửa tài khoản':'Tạo tài khoản'}>
      {edit && <>
        <Field label="Họ tên" required><Input value={edit.ho_ten} onChange={e=>setEdit({...edit,ho_ten:e.target.value})}/></Field>
        <Field label="Email" required hint={edit.id?'Không đổi được email sau khi tạo':''}><Input type="email" value={edit.email} disabled={!!edit.id} onChange={e=>setEdit({...edit,email:e.target.value})}/></Field>
        <Field label="Mật khẩu" hint={edit.id?'Để trống nếu không đổi mật khẩu':'Người dùng đăng nhập bằng email + mật khẩu này'}><Input value={edit.password||''} placeholder={edit.id?'••••••':''} onChange={e=>setEdit({...edit,password:e.target.value})}/></Field>
        <Field label="Vai trò"><Select value={edit.vai_tro} onChange={e=>setEdit({...edit,vai_tro:e.target.value})}>{Object.values(ROLES).map(r=><option key={r} value={r}>{ROLE_LABEL[r]}</option>)}</Select></Field>
        <div className="flex gap-2 mt-2"><Btn variant="ghost" onClick={()=>setEdit(null)}>Huỷ</Btn><Btn variant="brand" className="flex-1" onClick={save}>{edit.id?'Lưu':'Tạo & cấp'}</Btn></div>
      </>}
    </Modal>
  </div>;
}

function AdminPayroll(){
  const { db, markPaid:apiMarkPaid, notify } = useApp();
  const [ky, setKy] = useState('');
  const { posts, cmts } = allRows(db);
  const all = [...posts, ...cmts];
  const kyList = [...new Set(all.filter(x=>x.trang_thai===ST.DAT||x.trang_thai===ST.DA_CHI).map(x=>x.ky_thanh_toan||kyOf(x.created_at)))].sort().reverse();

  const flt = x => (x.trang_thai===ST.DAT||x.trang_thai===ST.DA_CHI) && (!ky || (x.ky_thanh_toan||kyOf(x.created_at))===ky);

  const filmings = (db.project_filmings||[]).map(f=>({...f}));
  // gom theo sales
  const bySales = {};
  db.users.filter(u=>u.vai_tro===ROLES.SALES).forEach(u=>{ bySales[u.id]={u, postDat:0,tienPost:0,cmtDat:0,tienCmt:0,quayDat:0,tienQuay:0,daChi:0,conLai:0}; });
  posts.filter(flt).forEach(p=>{ const r=bySales[p.sales_id]; if(!r)return; r.postDat++; r.tienPost+=p.thanh_tien; if(p.trang_thai===ST.DA_CHI)r.daChi+=p.thanh_tien; else r.conLai+=p.thanh_tien; });
  cmts.filter(flt).forEach(c=>{ const r=bySales[c.sales_id]; if(!r)return; r.cmtDat++; r.tienCmt+=c.thanh_tien; if(c.trang_thai===ST.DA_CHI)r.daChi+=c.thanh_tien; else r.conLai+=c.thanh_tien; });
  filmings.filter(flt).forEach(f=>{ const r=bySales[f.sales_id]; if(!r)return; r.quayDat++; r.tienQuay+=f.thanh_tien; if(f.trang_thai===ST.DA_CHI)r.daChi+=f.thanh_tien; else r.conLai+=f.thanh_tien; });
  const rows = Object.values(bySales).filter(r=>r.postDat||r.cmtDat||r.quayDat);

  const markPaid = async (salesId) => {
    if(!confirm('Đánh dấu ĐÃ CHI tất cả item Đạt của Sales này trong kỳ '+(ky||'tất cả')+'?')) return;
    if(await apiMarkPaid(salesId, ky||null)) notify('Đã đánh dấu Đã chi');
  };

const isAppMedia = (url)=> !!url && (url.startsWith('/media/') || url.startsWith('data:'));

const ytId = (u)=>{ const m=/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{6,})/.exec(u||''); return m?m[1]:null; };
const driveId = (u)=>{ const m=/drive\.google\.com\/file\/d\/([\w-]+)/.exec(u||''); return m?m[1]:null; };
function EmbedMedia({url, className='w-full h-full'}){
  if(!url) return <div className={className+" flex items-center justify-center bg-slate-900 text-white/60 text-sm"}>Chưa có video/ảnh mẫu</div>;
  const yt=ytId(url); if(yt) return <iframe src={"https://www.youtube.com/embed/"+yt} title="mẫu" className={className} allow="accelerometer; autoplay; encrypted-media; picture-in-picture" allowFullScreen frameBorder="0"/>;
  const dv=driveId(url); if(dv) return <iframe src={"https://drive.google.com/file/d/"+dv+"/preview"} title="mẫu" className={className} allow="autoplay" allowFullScreen frameBorder="0"/>;
  if(isAppMedia(url) || /\.(mp4|webm|mov|m4v)(\?|#|$)/i.test(url)) return <video src={url} controls playsInline preload="metadata" className={className+" bg-black object-contain"}/>;
  if(/\.(png|jpe?g|gif|webp)(\?|#|$)/i.test(url) || url.startsWith('data:image')) return <img src={url} className={className+" object-contain bg-slate-900"}/>;
  return <div className={className+" flex flex-col items-center justify-center bg-slate-900 text-white/70"}><span className="text-4xl">🔗</span><a href={url} target="_blank" className="text-xs underline mt-2">Mở link mẫu</a></div>;

function FilmingEditor({onDone, project}){
  const { db, createFilming, editFilming, notify } = useApp();

  const [ngay, setNgay] = useState((project && project.ngay_quay ? String(project.ngay_quay) : new Date().toISOString()).slice(0,10));
  const [uploads, setUploads] = useState(project ? (project.uploads||[]).map(u=>({id:u.id, shot_id:u.shot_id, media_type:u.media_type, media_url:u.media_url})) : []);
  const [openShot, setOpenShot] = useState(null);
  const [sampleShot, setSampleShot] = useState(null);

  const addMedia = (shotId, item)=> setUploads(prev=>[...prev, {id:uid('up'), shot_id:shotId, ...item}]);
  const delMedia = (id)=> setUploads(prev=>prev.filter(u=>u.id!==id));
  const mediaOf = (shotId)=> uploads.filter(u=>u.shot_id===shotId);

  const reqShots = template ? filmReqShots(template) : [];
  const reqDone = reqShots.filter(s=>mediaOf(s.id).length>0).length;
  const canSubmit = ten.trim() && template && reqDone===reqShots.length;
  const upList = ()=> uploads.map(u=>({id:u.id, shot_id:u.shot_id, media_type:u.media_type, media_url:u.media_url}));

        <Select value={templateId} onChange={e=>changeTemplate(e.target.value)} disabled={editing}>{templates.map(t=><option key={t.id} value={t.id}>{t.he_san_pham} — {t.ten}</option>)}</Select>
      </Field></div>
      <div className="sm:col-span-2"><Field label="Tên công trình" required><Input value={ten} onChange={e=>setTen(e.target.value)} placeholder="VD: Nhà phố Q7 - anh Minh"/></Field></div>
      <Field label="Khu vực"><Input value={khu} onChange={e=>setKhu(e.target.value)} placeholder="Quận / Tỉnh"/></Field>
      <Field label="Ngày quay"><Input type="date" value={ngay} onChange={e=>setNgay(e.target.value)}/></Field>
    </div>

    <div className="bg-brand/10 border border-brand/30 rounded-xl px-3 py-2 text-xs text-brand-dark flex items-center justify-between gap-2">
      <span>Tiến độ cảnh <b>bắt buộc</b>: {reqDone}/{reqShots.length}</span>
      <span className="w-28 h-2 bg-white rounded-full overflow-hidden shrink-0"><span className="block h-full bg-brand transition-all" style={{width:(reqShots.length?reqDone/reqShots.length*100:0)+'%'}}></span></span>
    </div>

    {template && template.phases.map((ph,pi)=><div key={ph.id}>
      <div className="flex items-center gap-2 mb-2 mt-1"><span className="text-sm font-bold text-ink">{ph.thu_tu}. {ph.ten}</span><span className="text-[11px] text-slate-400">{ph.shots.filter(s=>s.active).length} cảnh</span></div>
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
        {ph.shots.filter(s=>s.active).map(shot=>{ const md=mediaOf(shot.id); const has=md.length>0; const hasSample=!!shot.source_mau_url;
          return <div key={shot.id}

            <button onClick={()=> hasSample ? setSampleShot(shot) : setOpenShot(shot)}
              className="w-full aspect-video flex items-center justify-center relative group" style={{background:phaseBg(pi)}}>
              {hasSample ? <SampleThumb url={shot.source_mau_url}/> : null}
              {(!hasSample || SampleThumb({url:shot.source_mau_url})===null) && <span className="text-5xl opacity-90 relative">{iconFor(shot.ten)}</span>}
              {shot.bat_buoc && <span className="absolute top-2 left-2"><ReqBadge/></span>}

// Popup tải nguồn cho 1 cảnh: tải trực tiếp lên app (R2) hoặc dán link Drive
function ShotUploadModal({shot, media, onClose, onAdd, onDel}){
  const { uploadMedia, notify } = useApp();
  const [tab, setTab] = useState('upload');
  const [link, setLink] = useState('');
  const [busy, setBusy] = useState(false);
  const [prog, setProg] = useState(null); // {name, pct, loaded, total}
  const [preview, setPreview] = useState(null); // xem trước 1 nguồn
  const fileRef = useRef(null);
  const MAX = 100*1024*1024;

  const onFile = async (e) => {
    const files = Array.from(e.target.files||[]); e.target.value='';
    for(const f of files){
      if(f.size > MAX){ notify(`"${f.name}" ${fmtMB(f.size)} > 100MB — video lớn hãy dùng tab Dán link Drive`,'warn'); continue; }
      setBusy(true); setProg({ name:f.name, pct:0, loaded:0, total:f.size });
      try{
        const r = await uploadMedia(f, (pct,loaded,total)=>setProg({ name:f.name, pct, loaded, total }));
        onAdd({ media_type: r.media_type || (f.type.startsWith('image/')?MEDIA_TYPE.IMAGE:MEDIA_TYPE.VIDEO), media_url: r.media_url, nguon:'APP' });
        notify('Đã thêm 1 nguồn','ok');
      }catch(err){ notify(err.message||'Tải lên lỗi','err'); }
      setProg(null); setBusy(false);
    }
  };
  const addLink = () => { if(!link.trim()) return; onAdd({ media_type: isImgUrl(link)?MEDIA_TYPE.IMAGE:MEDIA_TYPE.VIDEO, media_url: link.trim(), nguon:'LINK' }); setLink(''); notify('Đã thêm link'); };

  return <Modal open onClose={onClose} title={shot.ten} wide>
    <div className="flex items-start gap-2 mb-3">
      <span className="text-2xl">{iconFor(shot.ten)}</span>
      <div className="flex-1 min-w-0"><div className="text-sm text-slate-600">{shot.mo_ta}</div>{shot.bat_buoc&&<div className="mt-1"><ReqBadge/></div>}</div>
      {shot.source_mau_url && <a href={shot.source_mau_url} target="_blank" className="text-xs text-blue-500 hover:underline shrink-0">👁 Xem mẫu</a>}
    </div>

    {/* Nguồn đã thêm — ô xem lớn, bấm để xem trước popup */}
    {media.length>0 && <div className="mb-3">
      <div className="text-xs font-semibold text-slate-600 mb-1.5">Nguồn đã thêm ({media.length}) — bấm để xem</div>
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
        {media.map(m=><div key={m.id} className="relative group rounded-xl overflow-hidden border border-slate-200 bg-slate-100 aspect-video">
          <button type="button" onClick={()=>setPreview(m)} className="block w-full h-full"><MediaThumb m={m}/></button>
          <span onClick={()=>onDel(m.id)} className="absolute top-1 right-1 bg-black/60 text-white rounded-full w-6 h-6 text-sm leading-6 text-center cursor-pointer">×</span>
          <span className="absolute bottom-1 left-1 text-[9px] px-1.5 py-0.5 rounded-full bg-black/55 text-white">{isDriveLink(m)?'🔗 Link':(m.media_type===MEDIA_TYPE.IMAGE?'🖼️ Ảnh':'🎬 Video')}</span>
        </div>)}
      </div>
    </div>}

    <div className="flex gap-1 bg-slate-100 p-1 rounded-xl mb-3">
      <button onClick={()=>setTab('upload')} className={"flex-1 px-3 py-1.5 rounded-lg text-sm font-medium "+(tab==='upload'?'bg-white shadow text-ink':'text-slate-500')}>📤 Tải lên app</button>
      <button onClick={()=>setTab('link')} className={"flex-1 px-3 py-1.5 rounded-lg text-sm font-medium "+(tab==='link'?'bg-white shadow text-ink':'text-slate-500')}>🔗 Dán link Drive</button>
    </div>

    {tab==='upload' ? <div>
      <input ref={fileRef} type="file" accept="image/*,video/*" multiple className="hidden" onChange={onFile} disabled={busy}/>
      <Btn variant="brand" className="w-full" disabled={busy} onClick={()=>fileRef.current && fileRef.current.click()}>{busy?'⏳ Đang tải lên…':'＋ Chọn ảnh / video'}</Btn>
      {prog && <div className="mt-2">
        <div className="flex items-center justify-between text-[11px] text-slate-500 mb-1"><span className="truncate max-w-[55%]">{prog.name}</span><span>{prog.pct}% · {fmtMB(prog.loaded)}/{fmtMB(prog.total)}</span></div>
        <div className="h-2 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-brand transition-all" style={{width:prog.pct+'%'}}></div></div>
      </div>}
      <div className="text-[11px] text-slate-400 mt-2">Lưu thẳng vào app · tối đa 100MB/file. Video &gt;100MB hãy dùng tab “Dán link Drive”.</div>
    </div> : <div>
      <Field label="Link Google Drive (đặt quyền 'Ai có link đều xem')"><Input value={link} onChange={e=>setLink(e.target.value)} placeholder="https://drive.google.com/file/d/…" onKeyDown={e=>e.key==='Enter'&&addLink()}/></Field>
      <Btn variant="brand" className="w-full" onClick={addLink}>Thêm link</Btn>
    </div>}

    <div className="flex justify-end mt-4"><Btn variant="brand" onClick={onClose}>Xong</Btn></div>

    {/* popup xem trước 1 nguồn */}
    {preview && <div className="fixed inset-0 z-[60] bg-black/80 flex items-center justify-center p-3" onClick={()=>setPreview(null)}>
      <div className="w-full max-w-2xl" onClick={e=>e.stopPropagation()}>
        <div className="rounded-2xl overflow-hidden bg-black aspect-video"><MediaView m={preview}/></div>
        <div className="flex justify-between mt-2">
          <Btn variant="danger" onClick={()=>{onDel(preview.id); setPreview(null);}}>Xoá nguồn này</Btn>
          <Btn variant="ghost" onClick={()=>setPreview(null)}>Đóng</Btn>
        </div>
      </div>
    </div>}
  </Modal>;
}

function MediaThumbMini({r}){
  const m=r.up;

// Kho media 2 khung: trái = danh sách theo thư mục / nhóm source, phải = xem trước
function MediaManager(){
  const { db, deleteUpload, cleanupMedia, notify } = useApp();
  const sidx = shotIndex(db);
  const users = db.users||[];
  const [fSt, setFSt] = useState('');
  const [fNguon, setFNguon] = useState('');
  const [q, setQ] = useState('');
  const [groupBy, setGroupBy] = useState('project'); // project | shot
  const [sel, setSel] = useState(null);
  const cut = new Date(Date.now()-30*864e5).toISOString();

  const rows = (db.project_filmings||[]).flatMap(p=>(p.uploads||[]).map(u=>{
    const isApp = isAppMedia(u.media_url);
    const chuaDuyet = !['DAT','DA_CHI'].includes(p.trang_thai);
    const expDay = chuaDuyet ? Math.max(0, 30 - Math.floor((Date.now()-new Date(p.created_at||Date.now()).getTime())/864e5)) : null;
    return { key:u.id, up:u, p, isApp, chuaDuyet, expDay,
      sales: users.find(x=>x.id===p.sales_id)?.ho_ten||'—',
      shot: sidx[u.shot_id]?.ten||'(cảnh đã xoá)', phase: sidx[u.shot_id]?.phase||'' };
  })).filter(r=> (!fSt||r.p.trang_thai===fSt) && (!fNguon|| (fNguon==='APP'?r.isApp:!r.isApp)) && (!q|| (r.p.ten_cong_trinh+' '+r.shot+' '+r.sales).toLowerCase().includes(q.toLowerCase())));

  const appCount = rows.filter(r=>r.isApp).length;
  const expiring = (db.project_filmings||[]).filter(p=>!['DAT','DA_CHI'].includes(p.trang_thai)&&(p.created_at||'')<cut).reduce((s,p)=>s+(p.uploads||[]).length,0);
  const selRow = rows.find(r=>r.key===(sel&&sel.key)) || null;

  // gom nhóm
  const groups = [];
  const gmap = {};
  const gkey = r => groupBy==='project' ? r.p.id : r.shot;
  const glabel = r => groupBy==='project' ? {t:'📁 '+r.p.ten_cong_trinh, s:r.sales+' · '+ST_LABEL[r.p.trang_thai]} : {t:'🎬 '+r.shot, s:'nhóm source · '+r.phase};
  rows.forEach(r=>{ const k=gkey(r); if(!gmap[k]){ gmap[k]={...glabel(r), items:[]}; groups.push(gmap[k]); } gmap[k].items.push(r); });

  const del = async (r)=>{ if(!confirm('Xoá media này khỏi công trình "'+r.p.ten_cong_trinh+'"?'))return; if(await deleteUpload(r.up.id)){ notify('Đã xoá media'); if(selRow&&selRow.key===r.key) setSel(null); } };
  const clean = async ()=>{ if(!confirm('Dọn ngay toàn bộ media của công trình CHƯA duyệt quá 30 ngày?'))return; await cleanupMedia(); };

  return <div className="space-y-3">
    <div className="grid grid-cols-3 gap-3">
      <Stat label="Tổng media" value={rows.length}/>
      <Stat label="Lưu trong app (R2)" value={appCount} sub="còn lại là link Drive"/>
      <Stat label="Sắp bị dọn (quá 30 ngày)" value={expiring} color="text-rose-600"/>
    </div>
    <div className="bg-brand/10 border border-brand/30 rounded-xl px-3 py-2 text-[11px] text-brand-dark flex items-center justify-between gap-2">
      <span>Media công trình <b>chưa duyệt</b> tự xoá sau <b>30 ngày</b>. File app mới bị xoá; link Drive chỉ gỡ khỏi danh sách.</span>
      <Btn variant="soft" onClick={clean}>🧹 Dọn ngay</Btn>
    </div>
    <div className="bg-white rounded-2xl border border-line shadow-card p-3 flex flex-wrap gap-2 items-center">
      <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
        <button onClick={()=>setGroupBy('project')} className={"px-2.5 py-1 rounded-lg text-xs font-medium "+(groupBy==='project'?'bg-white shadow text-ink':'text-slate-500')}>📁 Theo công trình</button>
        <button onClick={()=>setGroupBy('shot')} className={"px-2.5 py-1 rounded-lg text-xs font-medium "+(groupBy==='shot'?'bg-white shadow text-ink':'text-slate-500')}>🎬 Theo nhóm source</button>
      </div>
      <Input value={q} onChange={e=>setQ(e.target.value)} placeholder="Tìm công trình / cảnh / sales…" className="max-w-[200px]"/>
      <Select value={fSt} onChange={e=>setFSt(e.target.value)} className="max-w-[150px]"><option value="">Mọi trạng thái</option>{Object.keys(ST_LABEL).map(s=><option key={s} value={s}>{ST_LABEL[s]}</option>)}</Select>
      <Select value={fNguon} onChange={e=>setFNguon(e.target.value)} className="max-w-[140px]"><option value="">Mọi nguồn</option><option value="APP">Tải lên app</option><option value="LINK">Link Drive</option></Select>
    </div>

    {rows.length===0 ? <Empty>Chưa có media nào.</Empty> :
    <div className="grid md:grid-cols-[minmax(0,1fr)_minmax(0,1.05fr)] gap-3">
      {/* trái: danh sách theo thư mục */}
      <div className="bg-white rounded-2xl border border-line shadow-card overflow-hidden max-h-[70vh] overflow-y-auto">

        <div className="flex gap-2"><button onClick={()=>setEditTpl(template)} className="text-xs text-blue-500 hover:underline">Sửa quy trình</button>

      <div className="px-4 py-2 bg-slate-50 border-b flex items-center justify-between">

          <button onClick={()=>setEditShot({phaseId:ph.id, shot:{ten:'',mo_ta:'',source_mau_url:'',bat_buoc:true,active:true}})} className="text-xs text-brand-dark hover:underline">＋ Thêm cảnh</button></div>

  </div>;
}

function FilmReview({project, template, onBack}){
  const { db, reviewFilming, notify } = useApp();
  // chấm từng source: rate[uploadId] = true(đạt) | false(loại) | undefined(chưa)
  const [rate, setRate] = useState(()=>{ const r={}; (project.uploads||[]).forEach(u=>{ if(u.dat_item!=null) r[u.id]=u.dat_item; }); return r; });
  const [reason, setReason] = useState('');
  const [rejecting, setRejecting] = useState(false);
  const [preview, setPreview] = useState(null);
  const [sampleShot, setSampleShot] = useState(null);
  const sales = db.users.find(u=>u.id===project.sales_id);
  const mediaOf = (shot)=> (project.uploads||[]).filter(u=>u.shot_id===shot.id);
  const setSrc = (id,v)=> setRate(r=>({...r, [id]: r[id]===v ? undefined : v}));
  const shotOk = (shot)=> mediaOf(shot).some(u=>rate[u.id]===true);

  const shots = template ? template.phases.flatMap(p=>p.shots.filter(s=>s.active)) : [];
  const datShots = shots.filter(shotOk);
  const total = datShots.reduce((t,s)=>t+filmShotPrice(s, db.pricing), 0);
  const ratings = ()=>{ const o={}; Object.keys(rate).forEach(k=>{ if(rate[k]!==undefined) o[k]=rate[k]?1:0; }); return o; };

  const doDone = async ()=>{ if(await reviewFilming(project.id, ST.DAT, '', ratings())){ notify('✅ Hoàn tất — chốt '+fmtVND(total)+' ('+datShots.length+' cảnh)'); onBack(); } };
  const doReject = async ()=>{ if(!reason.trim()) return notify('Nhập lý do','warn'); if(await reviewFilming(project.id, ST.KHONG_DAT, reason.trim(), ratings())){ notify('Đã trả về Sales quay lại'); onBack(); } };

  return <div className="space-y-4">
    <button onClick={onBack} className="text-sm text-slate-500 hover:text-ink">← Hàng chờ nghiệm thu</button>
    <div><h3 className="font-display text-lg font-bold text-ink">{project.ten_cong_trinh}</h3>
      <div className="text-xs text-slate-400 flex items-center gap-2"><HeChip he={template?.he_san_pham}/> {sales?.ho_ten||'—'} · {project.khu_vuc} · {fmtDay(project.ngay_quay)}</div></div>
    <div className="bg-brand/10 border border-brand/30 rounded-xl px-3 py-2 text-xs text-brand-dark flex items-center justify-between gap-2">
      <span>Chấm <b>Đạt/Loại</b> từng source. Cảnh đạt nếu còn ≥1 source đạt — tính tiền <b>1 lần/cảnh</b>.</span>
      <span className="shrink-0">Đạt <b>{datShots.length}/{shots.length}</b> · <b className="text-emerald-700">{fmtVND(total)}</b></span>
    </div>
    {template && template.phases.map(ph=><div key={ph.id} className="bg-white rounded-2xl border border-line shadow-card overflow-hidden">
      <div className="px-4 py-2 bg-slate-50 border-b text-sm font-semibold text-ink">{ph.thu_tu}. {ph.ten}</div>
      <div className="divide-y">
        {ph.shots.filter(s=>s.active).map(shot=>{ const md=mediaOf(shot); const ok=shotOk(shot);
          return <div key={shot.id} className="p-3">
            <div className="flex items-start justify-between gap-2 flex-wrap">
              <div className="min-w-0"><div className="flex items-center gap-2 flex-wrap"><span className="text-sm font-medium text-ink">{shot.ten}</span>{shot.bat_buoc&&<ReqBadge/>}
                <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">{fmtVND(filmShotPrice(shot, db.pricing))}{shot.don_gia!=null?' (riêng)':''}</span></div>
                <div className="text-xs text-slate-500 mt-0.5">{shot.mo_ta}</div></div>
              <div className="flex items-center gap-2 shrink-0">
                {md.length>0 && <span className={"text-[11px] font-semibold "+(ok?'text-emerald-600':'text-rose-500')}>{ok?'✓ Đạt +'+fmtVND(filmShotPrice(shot, db.pricing)):'Chưa đạt'}</span>}
                <button onClick={()=>setSampleShot(shot)} className="text-xs text-blue-500 hover:underline">👁 Mẫu</button>
              </div>
            </div>
            {md.length===0 ? <div className="text-xs text-rose-400 mt-2">✗ Sales chưa nộp source</div> :
            <div className="flex gap-2 mt-2 flex-wrap">
              {md.map(m=>{ const st=rate[m.id];
                return <div key={m.id} className={"w-24 rounded-lg border overflow-hidden "+(st===true?'border-emerald-400 ring-1 ring-emerald-200':st===false?'border-rose-300 opacity-60':'border-slate-200')}>
                  <button onClick={()=>setPreview(m)} className="block w-full h-16 bg-slate-100 relative">
                    {m.media_type===MEDIA_TYPE.IMAGE && !isDriveLink(m) ? <img src={m.media_url} className="w-full h-full object-cover"/>
                      : (!isDriveLink(m)) ? <video src={m.media_url} muted preload="metadata" className="w-full h-full object-cover"/>
                      : <span className="absolute inset-0 flex items-center justify-center text-2xl">🔗</span>}
                    {st===true&&<span className="absolute top-0.5 right-0.5 bg-emerald-500 text-white text-[9px] px-1 rounded-full">✓</span>}
                    {st===false&&<span className="absolute top-0.5 right-0.5 bg-rose-500 text-white text-[9px] px-1 rounded-full">✗</span>}
                  </button>
                  <div className="flex text-[10px] divide-x border-t">
                    <button onClick={()=>setSrc(m.id,true)} className={"flex-1 py-1 "+(st===true?'bg-emerald-500 text-white':'text-emerald-600 hover:bg-emerald-50')}>Đạt</button>
                    <button onClick={()=>setSrc(m.id,false)} className={"flex-1 py-1 "+(st===false?'bg-rose-500 text-white':'text-rose-600 hover:bg-rose-50')}>Loại</button>
                  </div>
                </div>;})}
            </div>}
          </div>; })}
      </div>
    </div>)}
    <div className="sticky bottom-0 bg-slate-100 pt-2 pb-1 space-y-2">
      {rejecting && <Textarea rows="2" value={reason} onChange={e=>setReason(e.target.value)} placeholder="Lý do trả về — nêu rõ cảnh nào cần quay lại…"/>}
      <div className="flex gap-2 items-center">
        {!rejecting
          ? <><Btn variant="danger" onClick={()=>setRejecting(true)}>Trả về Sales</Btn><Btn variant="ok" className="flex-1" onClick={doDone}>Hoàn tất nghiệm thu · {fmtVND(total)}</Btn></>
          : <><Btn variant="ghost" onClick={()=>setRejecting(false)}>Huỷ</Btn><Btn variant="danger" className="flex-1" disabled={!reason.trim()} onClick={doReject}>Xác nhận trả về</Btn></>}
      </div>
    </div>
    <SampleModal shot={sampleShot} onClose={()=>setSampleShot(null)}/>
    {preview && <div className="fixed inset-0 z-40 bg-black/70 flex items-center justify-center p-4" onClick={()=>setPreview(null)}>
      <div className="bg-white rounded-2xl overflow-hidden max-w-2xl w-full" onClick={e=>e.stopPropagation()}>
        <div className="aspect-video"><MediaView m={preview}/></div>
        <div className="p-3 flex justify-between items-center">
          <div className="flex gap-2"><Btn variant="ok" onClick={()=>{setSrc(preview.id,true);}}>Đạt</Btn><Btn variant="danger" onClick={()=>{setSrc(preview.id,false);}}>Loại</Btn></div>
          <Btn variant="ghost" onClick={()=>setPreview(null)}>Đóng</Btn>
        </div>
      </div>
    </div>}
  </div>;
}

function AdminFilming(){
  const { db } = useApp();
  const [from,setFrom]=useState(''); const [to,setTo]=useState(''); const [fSt,setFSt]=useState('');
  const projects = (db.project_filmings||[]).filter(p=> inRangeOrAllG(p.created_at,from,to) && (!fSt||p.trang_thai===fSt)).sort(byDateDesc);
  const exportCSV = () => {
    const r=[['Ngày','Sales','Công trình','Hệ SP','Khu vực','Cảnh đạt','Tổng cảnh','Trạng thái','Thành tiền']];
    projects.forEach(p=>{ const t=filmFindTpl(db,p.template_id); const sales=db.users.find(u=>u.id===p.sales_id); r.push([fmtDay(p.created_at),sales?.ho_ten||'—',p.ten_cong_trinh,t?.he_san_pham,p.khu_vuc,uniqShots(p.uploads).length,filmCountShots(t),ST_LABEL[p.trang_thai],p.thanh_tien]); });
    download('QUAY_CONG_TRINH.csv', toCSV(r));
  };
  return <div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <h2 className="font-display text-lg font-bold text-ink">🎬 Báo cáo Quay công trình</h2>
      <Btn variant="brand" onClick={exportCSV}>⬆ Xuất Excel</Btn>
    </div>
    <div className="bg-white rounded-2xl border border-line shadow-card p-3 flex flex-wrap gap-2 items-center">
      <DateRange from={from} to={to} setFrom={setFrom} setTo={setTo}/>
      <Select value={fSt} onChange={e=>setFSt(e.target.value)} className="max-w-[160px]"><option value="">Mọi trạng thái</option>{Object.keys(ST_LABEL).map(s=><option key={s} value={s}>{ST_LABEL[s]}</option>)}</Select>
    </div>
    <div className="bg-white rounded-2xl border border-line shadow-card overflow-auto">
      <table className="w-full text-sm min-w-[760px]">
        <thead className="bg-slate-50/70 text-[11px] font-semibold uppercase tracking-wide text-ink-muted text-left"><tr><Th>Ngày</Th><Th>Sales</Th><Th>Công trình</Th><Th>Hệ SP / Quy trình</Th><Th>Khu vực</Th><Th r>Cảnh đạt</Th><Th>Trạng thái</Th><Th r>Thành tiền</Th></tr></thead>
        <tbody className="divide-y">
          {projects.length===0 ? <tr><td colSpan="8"><Empty>Không có dữ liệu.</Empty></td></tr> :
            projects.map(p=>{ const t=filmFindTpl(db,p.template_id); const sales=db.users.find(u=>u.id===p.sales_id);
              return <tr key={p.id} className="hover:bg-slate-50">
                <Td>{fmtDay(p.created_at)}</Td><Td>{sales?.ho_ten||'—'}</Td><Td>{p.ten_cong_trinh}</Td>
                <Td><span className="text-brand-dark text-xs font-medium">{t?.he_san_pham}</span></Td><Td>{p.khu_vuc}</Td>
                <Td r>{uniqShots(p.uploads).length}/{filmCountShots(t)}</Td><Td><Badge st={p.trang_thai}/></Td><Td r><b>{p.thanh_tien?fmtVND(p.thanh_tien):'—'}</b></Td>
              </tr>; })}
        </tbody>
      </table>
    </div>
    <div className="text-[11px] text-slate-400">Việc chi tiền gộp chung ở <b>Bảng lương</b> (cột <b className="text-brand-dark">Tiền quay</b>).</div>
  </div>;
}
function inRangeOrAllG(iso,f,t){ if(!f&&!t) return true; return inRange(iso,f,t); }
