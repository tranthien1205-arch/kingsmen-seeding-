function download(filename, text, mime='text/csv;charset=utf-8'){
  const blob = new Blob(['﻿'+text], {type:mime}); // BOM để Excel đọc UTF-8
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function toCSV(rows){
  return rows.map(r=>r.map(c=>{
    let s = c==null? '' : String(c);
    if(/[",\n]/.test(s)) s='"'+s.replace(/"/g,'""')+'"';
    return s;
  }).join(',')).join('\n');
}
// Nén ảnh phía client trước khi lưu (resize max cạnh 1100px, jpeg 0.7)
function compressImage(file, maxSide=1100, quality=0.7){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w, height:h}=img;
        if(Math.max(w,h)>maxSide){ const k=maxSide/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg', quality));
      };
      img.onerror=reject; img.src=e.target.result;
    };
    r.onerror=reject; r.readAsDataURL(file);
  });
}

/* ============================================================
   3. LƯU BỀN + MIGRATE
============================================================ */
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return seedDB();
    let db = JSON.parse(raw);
    db = migrate(db);
    return db;
  }catch(e){ console.error('loadDB lỗi, khởi tạo mới', e); return seedDB(); }
}
function migrate(db){
  if(!db.version){ db.version = SCHEMA_VERSION; }
  // đảm bảo đủ mảng (dữ liệu cũ thiếu field không crash)
  db.users ||= []; db.groups ||= []; db.content_topics ||= []; db.cmt_suggestions ||= [];
  db.post_seedings ||= []; db.cmt_seedings ||= []; db.payouts ||= []; db.audit ||= [];
  db.pricing ||= { don_gia_post:15000, don_gia_cmt:3000, min_nhac_kingsmen:6, min_usp:2 };
  db.post_seedings.forEach(p=>{ p.react ??= 0; p.so_cmt_seeding ??= 0; p.so_cmt_tu_nhien ??= 0; p.thanh_tien ??= 0; });
  db.cmt_seedings.forEach(c=>{ c.proofs ||= []; c.so_cmt_seeding ??= 0; c.react ??= 0; c.so_cmt_tu_nhien ??= 0; c.thanh_tien ??= 0; });
  db.groups.forEach(g=>{ g.uu_tien ??= false; });
  db.content_topics.forEach(t=>{ t.uu_tien ??= false; });
  db.users.forEach(u=>{ u.password ??= '123456'; u.active ??= true; });
  return db;
}
function saveDB(db){
  try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); return true; }
  catch(e){
    console.error(e);
    alert('Không lưu được (bộ nhớ trình duyệt đầy — thường do quá nhiều ảnh). Hãy xoá bớt bản ghi cũ hoặc xuất Excel rồi reset.');
    return false;
  }
}

/* ============================================================
   5. CONTEXT ỨNG DỤNG
============================================================ */
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

const TOKEN_KEY = 'kingsmen_token';
// Trên localhost gọi thẳng API production (đã bật CORS) để test; production dùng same-origin.
const API_BASE = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'https://kingsmen-app-seeding.tranthien1205.workers.dev' : '';

function AppProvider({children}){
  const [db, setDb] = useState(null);
  const [token, setToken] = useState(()=> localStorage.getItem(TOKEN_KEY) || null);
  const [loading, setLoading] = useState(!!localStorage.getItem(TOKEN_KEY));
  const [toast, setToast] = useState(null);
  const notify = (msg, type='ok') => { setToast({msg,type}); setTimeout(()=>setToast(null), 2800); };

  const me = db ? db.me : null;
  const meId = me ? me.id : null;

  const call = async (path, opts) => {
    opts = opts || {};
    const res = await fetch(API_BASE+'/api'+path, {
      method: opts.method||'GET',
      headers: { 'Content-Type':'application/json', ...(token?{'Authorization':'Bearer '+token}:{}) },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || ('Lỗi '+res.status));
    return data;
  };

  // nạp dữ liệu khi có token (mở lại trang vẫn giữ đăng nhập)
  useEffect(()=>{
    let alive=true;
    if(!token){ setDb(null); setLoading(false); return; }
    setLoading(true);
    call('/bootstrap')
      .then(r=>{ if(alive){ setDb(r.db); setLoading(false); } })
      .catch(()=>{ if(alive){ localStorage.removeItem(TOKEN_KEY); setToken(null); setDb(null); setLoading(false); } });
    return ()=>{ alive=false; };
  }, [token]);

  const login = async (email, password) => {
    try{
      const r = await call('/login', {method:'POST', body:{email, password}});
      localStorage.setItem(TOKEN_KEY, r.token); setDb(r.db); setToken(r.token);
      return { ok:true };
    }catch(e){ return { ok:false, msg:e.message }; }
  };
  const logout = async () => {
    try{ await call('/logout', {method:'POST'}); }catch(e){}
    localStorage.removeItem(TOKEN_KEY); setToken(null); setDb(null);
  };

  // mọi thao tác ghi: gọi API → server trả {db} mới → cập nhật; lỗi thì báo toast
  const mut = async (path, opts) => {
    try{ const r = await call(path, opts); if(r && r.db) setDb(r.db); return true; }
    catch(e){ notify(e.message,'err'); return false; }
  };

  const api = {
    db, me, meId, notify, loading, token,
    login, logout,
    refresh: () => call('/bootstrap').then(r=>setDb(r.db)).catch(()=>{}),
    audit: ()=>{}, // server tự ghi nhật ký
    // thư viện
    upsertGroup: g => mut(g.id?`/groups/${g.id}`:'/groups', {method:g.id?'PATCH':'POST', body:g}),
    deleteGroup: id => mut(`/groups/${id}`, {method:'DELETE'}),
    upsertTopic: t => mut(t.id?`/topics/${t.id}`:'/topics', {method:t.id?'PATCH':'POST', body:t}),
    deleteTopic: id => mut(`/topics/${id}`, {method:'DELETE'}),
    upsertCmt: c => mut(c.id?`/cmtsug/${c.id}`:'/cmtsug', {method:c.id?'PATCH':'POST', body:c}),
    deleteCmt: id => mut(`/cmtsug/${id}`, {method:'DELETE'}),
    // tài khoản
    createUser: u => mut('/users', {method:'POST', body:u}),
    updateUser: (id, patch) => mut(`/users/${id}`, {method:'PATCH', body:patch}),
    deleteUser: id => mut(`/users/${id}`, {method:'DELETE'}),
    // đơn giá
    setPricing: p => mut('/pricing', {method:'PATCH', body:p}),
    // seeding
    createPost: p => mut('/posts', {method:'POST', body:p}),
    reviewPost: (id, result, reason) => mut(`/posts/${id}/review`, {method:'POST', body:{result, reason}}),
    createCmtSeed: c => mut('/cmtseed', {method:'POST', body:c}),
    reviewCmtSeed: (id, result, reason) => mut(`/cmtseed/${id}/review`, {method:'POST', body:{result, reason}}),
    markPaid: (sales_id, ky) => mut('/markpaid', {method:'POST', body:{sales_id, ky}}),
  };
  return <AppCtx.Provider value={api}>
    {children}
    {toast && <Toast toast={toast}/>}
  </AppCtx.Provider>;
}

}

    danger:'bg-rose-600 text-white hover:bg-rose-700',
    ok:'bg-emerald-600 text-white hover:bg-emerald-700',
    soft:'bg-slate-100 text-slate-700 hover:bg-slate-200',
  }[variant];
  return <button type={type} disabled={disabled} onClick={onClick}
    className={"px-3.5 py-2 rounded-xl text-sm font-medium transition disabled:opacity-40 disabled:cursor-not-allowed "+v+" "+className}>{children}</button>;
}
function Field({label, children, hint, required}){
  return <label className="block mb-3">
    <div className="text-xs font-semibold text-slate-600 mb-1">{label}{required && <span className="text-rose-500"> *</span>}</div>
    {children}
    {hint && <div className="text-[11px] text-slate-400 mt-1">{hint}</div>}
  </label>;
}
const inputCls = "w-full px-3 py-2 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-gold/40 focus:border-gold bg-white";
function Input(p){ return <input {...p} className={inputCls+" "+(p.className||'')}/>; }
function Textarea(p){ return <textarea {...p} className={inputCls+" "+(p.className||'')}/>; }
function Select({children, ...p}){ return <select {...p} className={inputCls+" "+(p.className||'')}>{children}</select>; }

function Modal({open, onClose, title, children, wide}){
  if(!open) return null;
  return <div className="fixed inset-0 z-40 bg-black/40 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} className={"bg-white w-full rounded-t-2xl sm:rounded-2xl shadow-xl max-h-[92vh] overflow-auto "+(wide?'sm:max-w-3xl':'sm:max-w-lg')}>
      <div className="sticky top-0 bg-white border-b px-4 py-3 flex items-center justify-between z-10">
        <h3 className="font-semibold text-ink">{title}</h3>
        <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
      </div>
      <div className="p-4">{children}</div>
    </div>
  </div>;
}
function Empty({children}){ return <div className="text-center text-slate-400 text-sm py-10">{children}</div>; }
function Stat({label, value, sub, color='text-ink'}){
  return <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
    <div className="text-xs text-slate-500">{label}</div>
    <div className={"text-xl font-bold mt-1 "+color}>{value}</div>
    {sub && <div className="text-[11px] text-slate-400 mt-0.5">{sub}</div>}
  </div>;
}
function Tabs({tabs, active, onChange}){
  return <div className="flex gap-1 bg-slate-100 p-1 rounded-xl overflow-x-auto">
    {tabs.map(t=><button key={t.key} onClick={()=>onChange(t.key)}
      className={"px-3 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap transition "+(active===t.key?'bg-white shadow text-ink':'text-slate-500')}>
      {t.label}{t.count!=null && <span className={"ml-1.5 text-xs px-1.5 rounded-full "+(active===t.key?'bg-gold text-white':'bg-slate-200 text-slate-500')}>{t.count}</span>}
    </button>)}
  </div>;
}
function Toggle({on, onClick, labels=['Hiện','Ẩn']}){
  return <button onClick={onClick} className={"px-2.5 py-1 rounded-lg text-xs font-medium "+(on?'bg-emerald-100 text-emerald-700':'bg-slate-200 text-slate-500')}>
    {on?labels[0]:labels[1]}
  </button>;
}

function Login(){
  const { login } = useApp();
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const doLogin = async () => {
    if(busy) return;

    const r = await login(email, pw);
    setBusy(false);

  };

  return <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-ink to-ink-soft">

        onKeyDown={e=>e.key==='Enter'&&doLogin()}/></Field>

}

function CopyBtn({text, className='', label='📋 Copy'}){
  const { notify } = useApp();
  const [done, setDone] = useState(false);
  const copy = () => {
    const ok = navigator.clipboard?.writeText(text);
    // fallback cho file:// / trình duyệt cũ
    if(!navigator.clipboard){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); }
    setDone(true); notify('Đã copy nội dung'); setTimeout(()=>setDone(false), 2000);
  };
  return <Btn variant={done?'ok':'soft'} className={className} onClick={copy}>{done?'✓ Đã copy':label}</Btn>;
}
function SalesNewPost({go}){
  const { db, meId, createPost, notify } = useApp();
  const [q, setQ] = useState('');
  const [fLoai, setFLoai] = useState('');
  const [topicId, setTopicId] = useState('');
  const [groupId, setGroupId] = useState('');
  const [link, setLink] = useState('');
  const [react, setReact] = useState('');
  const [cmtS, setCmtS] = useState('');
  const [cmtT, setCmtT] = useState('');

  const [onlyPri, setOnlyPri] = useState(false);
  const topics = sortPri(db.content_topics.filter(t=>t.active
    && (!onlyPri || t.uu_tien)
    && (!fLoai || t.loai_bai===fLoai)
    && (!q || (t.chu_de+' '+t.noi_dung+' '+(t.tags||[]).join(' ')).toLowerCase().includes(q.toLowerCase()))));
  const groups = sortPri(db.groups.filter(g=>g.active));
  const topic = db.content_topics.find(t=>t.id===topicId);
  const chosenGroup = groups.find(g=>g.id===groupId);
  const priTopics = db.content_topics.filter(t=>t.active && t.uu_tien).length;
  const priGroups = groups.filter(g=>g.uu_tien).length;

  const dupLink = link && db.post_seedings.some(p=>p.link_bai && p.link_bai.trim()===link.trim());

  const submit = async (asDraft) => {
    if(!topicId) return notify('Chọn chủ đề/nội dung','warn');
    if(!groupId) return notify('Chọn group mục tiêu','warn');
    if(!asDraft){
      if(!isFbUrl(link)) return notify('Cần link Facebook hợp lệ để gửi nghiệm thu','warn');
    }
    const ok = await createPost({
      topic_id:topicId, group_id:groupId, link_bai:link.trim(),
      react:Number(react)||0, so_cmt_seeding:Number(cmtS)||0, so_cmt_tu_nhien:Number(cmtT)||0,
      submit: !asDraft,
    });
    if(ok){ notify(asDraft?'Đã lưu nháp':'Đã gửi nghiệm thu POST'); go('home'); }
  };

  return <div className="space-y-4 max-w-2xl">
    <h2 className="text-lg font-bold text-ink">📝 Tạo POST seeding</h2>

    {(priTopics>0 || priGroups>0) && <div className="bg-gold/10 border border-gold/30 rounded-2xl p-3 text-xs text-gold-dark">
      ⭐ Marketing đang ưu tiên {priTopics>0 && <b>{priTopics} tuyến nội dung</b>}{priTopics>0&&priGroups>0 && ' và '}{priGroups>0 && <b>{priGroups} group</b>} — hãy seeding các mục ⭐ trước.
    </div>}

    {/* B1: chọn nội dung */}
    <div className="bg-white rounded-2xl p-4 border border-slate-100">
      <div className="flex items-center justify-between mb-2">
        <div className="text-sm font-semibold text-ink">1. Chọn chủ đề / nội dung</div>
        {priTopics>0 && <button onClick={()=>setOnlyPri(v=>!v)}
          className={"px-2.5 py-1 rounded-lg text-xs font-medium "+(onlyPri?'bg-gold text-white':'bg-slate-100 text-slate-500')}>⭐ Chỉ ưu tiên</button>}
      </div>
      <div className="flex gap-2 mb-2">
        <Input placeholder="Tìm theo từ khoá…" value={q} onChange={e=>setQ(e.target.value)}/>
        <Select value={fLoai} onChange={e=>setFLoai(e.target.value)} className="max-w-[45%]">
          <option value="">Mọi loại bài</option>
          {LOAI_BAI.map(l=><option key={l}>{l}</option>)}
        </Select>
      </div>
      <div className="space-y-2 max-h-64 overflow-auto">
        {topics.length===0 && <Empty>Không có nội dung phù hợp.</Empty>}
        {topics.map(t=>
          <div key={t.id} onClick={()=>setTopicId(t.id)}
            className={"p-3 rounded-xl border cursor-pointer transition "+(topicId===t.id?'border-gold bg-gold/5':t.uu_tien?'border-gold/40 bg-gold/[0.03]':'border-slate-200 hover:border-slate-300')}>
            <div className="flex items-center justify-between gap-2">
              <div className="flex items-center gap-1.5 min-w-0">
                {t.uu_tien && <PriBadge small/>}
                <div className="font-medium text-sm text-ink truncate">{t.chu_de}</div>

              <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 shrink-0">{t.loai_bai}</span>

            <div className={"text-xs text-slate-500 mt-1 "+(topicId===t.id?'':'line-clamp-2')}>{t.noi_dung}</div>

function ImageUploader({images, setImages}){
  const { notify } = useApp();
  const ref = useRef();
  const onPick = async (e) => {
    const files = Array.from(e.target.files||[]);
    for(const f of files){
      try{ const b64 = await compressImage(f); setImages(prev=>[...prev, {id:uid('img'), image_url:b64, uploaded_at:nowISO()}]); }
      catch(err){ notify('Lỗi đọc ảnh','err'); }
    }
    e.target.value='';
  };
  return <div>
    <div className="flex flex-wrap gap-2 mb-2">
      {images.map(im=><div key={im.id} className="relative w-20 h-20 rounded-lg overflow-hidden border">
        <img src={im.image_url} className="w-full h-full object-cover"/>
        <button onClick={()=>setImages(prev=>prev.filter(x=>x.id!==im.id))} className="absolute top-0.5 right-0.5 bg-black/60 text-white w-5 h-5 rounded-full text-xs leading-none">×</button>
      </div>)}

}

  const reset = () => { setPostId(''); setPostLink(''); setSugId(''); setSoCmt('1'); setReact(''); setCmtT(''); setImages([]); };

          </Select>
          {chosenPost && <div className="text-[11px] text-slate-400 mt-1 truncate">🔗 {chosenPost.link_bai}</div>}
          {myPosts.length===0 && <div className="text-[11px] text-amber-600 mt-1">Bạn chưa có post seeding nào — hãy tạo POST trước.</div>}

function DateRange({from, to, setFrom, setTo}){
  return <div className="flex items-center gap-2 text-sm">
    <Input type="date" value={from} onChange={e=>setFrom(e.target.value)} className="max-w-[46%]"/>
    <span className="text-slate-400">→</span>
    <Input type="date" value={to} onChange={e=>setTo(e.target.value)} className="max-w-[46%]"/>
  </div>;

function inRange(iso, from, to){
  if(!iso) return false; const d=iso.slice(0,10);
  if(from && d<from) return false; if(to && d>to) return false; return true;
}
function MktDashboard(){
  const { db } = useApp();
  const [from, setFrom] = useState(''); const [to, setTo] = useState('');
  const posts = db.post_seedings.filter(p=>inRange(p.created_at,from,to));
  const cmts  = db.cmt_seedings.filter(c=>inRange(c.created_at,from,to));
  const all = [...posts.map(p=>({...p,_k:'POST'})), ...cmts.map(c=>({...c,_k:'CMT'}))];

  const pending = all.filter(x=>x.trang_thai===ST.CHO_DUYET).length;
  const tamTinh = all.filter(x=>x.trang_thai===ST.CHO_DUYET).reduce((s,x)=> s + (x._k==='POST'?tienPost(db.pricing):tienCmt(db.pricing,x.so_cmt_seeding)),0);
  const datCount = all.filter(x=>x.trang_thai===ST.DAT||x.trang_thai===ST.DA_CHI).length;
  const tongChi = all.filter(x=>x.trang_thai===ST.DAT||x.trang_thai===ST.DA_CHI).reduce((s,x)=>s+x.thanh_tien,0);

  // theo loại bài (POST) + theo người
  const byLoai = {};
  posts.filter(p=>p.trang_thai===ST.DAT||p.trang_thai===ST.DA_CHI).forEach(p=>{
    const t=db.content_topics.find(x=>x.id===p.topic_id); const k=t?.loai_bai||'—'; byLoai[k]=(byLoai[k]||0)+1; });
  const byMucTieu = {};
  posts.filter(p=>p.trang_thai===ST.DAT||p.trang_thai===ST.DA_CHI).forEach(p=>{
    const t=db.content_topics.find(x=>x.id===p.topic_id); const k=t?.muc_tieu||'—'; byMucTieu[k]=(byMucTieu[k]||0)+1; });
  const byNguoi = {};
  all.filter(x=>x.trang_thai===ST.DAT||x.trang_thai===ST.DA_CHI).forEach(x=>{
    const u=db.users.find(u=>u.id===x.sales_id); const k=u?.ho_ten||'—';
    byNguoi[k] ||= {dat:0, tien:0}; byNguoi[k].dat++; byNguoi[k].tien+=x.thanh_tien; });

  return <div className="space-y-4">
    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
      <h2 className="text-lg font-bold text-ink">📊 Dashboard</h2>
      <DateRange from={from} to={to} setFrom={setFrom} setTo={setTo}/>
    </div>
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <Stat label="Chờ duyệt" value={pending} color="text-amber-600"/>
      <Stat label="Tổng chi tạm tính" value={fmtVND(tamTinh)} color="text-amber-600" sub="nếu duyệt hết"/>
      <Stat label="Item đã Đạt" value={datCount} color="text-emerald-600"/>
      <Stat label="Tổng đã ghi công" value={fmtVND(tongChi)} color="text-emerald-600"/>
    </div>

    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <BreakdownCard title="Sản lượng đạt theo loại bài" data={byLoai}/>
      <BreakdownCard title="Theo mục tiêu (BIẾT→HÀNH ĐỘNG)" data={byMucTieu}/>
    </div>

    <div className="bg-white rounded-2xl border border-slate-100 p-4">
      <div className="text-sm font-semibold text-ink mb-3">Theo người</div>
      {Object.keys(byNguoi).length===0 ? <Empty>Chưa có item đạt.</Empty> :
        <table className="w-full text-sm">
          <thead><tr className="text-left text-xs text-slate-400"><th className="pb-2">Sales</th><th className="pb-2 text-right">Item đạt</th><th className="pb-2 text-right">Thành tiền</th></tr></thead>
          <tbody className="divide-y">
            {Object.entries(byNguoi).sort((a,b)=>b[1].tien-a[1].tien).map(([k,v])=>
              <tr key={k}><td className="py-2">{k}</td><td className="py-2 text-right">{v.dat}</td><td className="py-2 text-right font-semibold">{fmtVND(v.tien)}</td></tr>)}
          </tbody>
        </table>}
    </div>
  </div>;
}
function BreakdownCard({title, data}){
  const entries = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(1, ...entries.map(e=>e[1]));
  return <div className="bg-white rounded-2xl border border-slate-100 p-4">
    <div className="text-sm font-semibold text-ink mb-3">{title}</div>
    {entries.length===0 ? <Empty>Chưa có dữ liệu.</Empty> :
      <div className="space-y-2">{entries.map(([k,v])=>
        <div key={k}>
          <div className="flex justify-between text-xs mb-0.5"><span className="text-slate-600">{k}</span><span className="font-semibold">{v}</span></div>
          <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-gold rounded-full" style={{width:(v/max*100)+'%'}}/></div>
        </div>)}
      </div>}
  </div>;
}

function Library(){
  const { db, upsertGroup, upsertTopic, upsertCmt, deleteGroup, deleteTopic, deleteCmt, notify, audit } = useApp();
  const [tab, setTab] = useState('groups');
  const [edit, setEdit] = useState(null); // {type, item}

  const openNew = (type) => setEdit({type, item:blankOf(type)});
  const blankOf = (type) => type==='groups' ? {ten_group:'',link:'',loai:GROUP_LOAI[0],so_member:0,active:true,uu_tien:false}
    : type==='topics' ? {chu_de:'',noi_dung:'',loai_bai:LOAI_BAI[0],muc_tieu:'',tags:[],active:true,uu_tien:false}
    : {noi_dung_goi_y:'',tuyen:'',loai_bai:'',tags:[],thu_tu:0,active:true};

  const toggle = (type, item) => {
    if(type==='groups') upsertGroup({...item, active:!item.active});
    if(type==='topics') upsertTopic({...item, active:!item.active});
    if(type==='cmts')   upsertCmt({...item, active:!item.active});
    audit('đổi hiện/ẩn', type, item.id);
  };
  const togglePri = (type, item) => {
    if(type==='groups') upsertGroup({...item, uu_tien:!item.uu_tien});
    if(type==='topics') upsertTopic({...item, uu_tien:!item.uu_tien});
    audit(item.uu_tien?'bỏ ưu tiên':'đặt ưu tiên', type, item.id);
  };
  const remove = async (type, item) => {
    if(!confirm('Xoá mục này khỏi thư viện?')) return;
    const fn = type==='groups'?deleteGroup : type==='topics'?deleteTopic : deleteCmt;
    if(await fn(item.id)) notify('Đã xoá');
  };

  const tabs = [
    {key:'groups', label:'Group mục tiêu', count:db.groups.length},
    {key:'topics', label:'Chủ đề/Nội dung POST', count:db.content_topics.length},
    {key:'cmts', label:'Gợi ý CMT', count:db.cmt_suggestions.length},
  ];

  return <div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <h2 className="text-lg font-bold text-ink">📚 Thư viện chung</h2>
      <div className="flex gap-2">
        <ImportBtn tab={tab}/>
        <Btn variant="gold" onClick={()=>openNew(tab)}>＋ Thêm</Btn>
      </div>
    </div>

    {tab==='groups' && <LibList items={sortPri(db.groups)} render={g=>(<>
      <div className="flex items-center gap-2">
        {g.uu_tien && <PriBadge/>}
        <span className="font-medium text-sm text-ink">{g.ten_group}</span>
      </div>
      <div className="text-xs text-slate-500">{g.loai} · {(g.so_member||0).toLocaleString('vi-VN')} tv · <a href={g.link} target="_blank" className="text-blue-500 underline">link</a></div>
    </>)} onEdit={g=>setEdit({type:'groups',item:g})} onToggle={g=>toggle('groups',g)} onDel={g=>remove('groups',g)} onPri={g=>togglePri('groups',g)}/>}

    {tab==='topics' && <LibList items={sortPri(db.content_topics)} render={t=>(<>
      <div className="flex items-center gap-2 flex-wrap">
        {t.uu_tien && <PriBadge/>}
        <span className="font-medium text-sm text-ink">{t.chu_de}</span>
        <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">{t.loai_bai}</span>
        {t.muc_tieu && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-gold/10 text-gold-dark">{t.muc_tieu}</span>}</div>
      <div className="text-xs text-slate-500 line-clamp-2 mt-0.5">{t.noi_dung}</div>
    </>)} onEdit={t=>setEdit({type:'topics',item:t})} onToggle={t=>toggle('topics',t)} onDel={t=>remove('topics',t)} onPri={t=>togglePri('topics',t)}/>}

    {tab==='cmts' && <LibList items={db.cmt_suggestions} render={c=>(<>
      <div className="text-sm text-ink">{c.noi_dung_goi_y}</div>

    </>)} onEdit={c=>setEdit({type:'cmts',item:c})} onToggle={c=>toggle('cmts',c)} onDel={c=>remove('cmts',c)}/>}

function LibEditModal({edit, onClose}){
  const { upsertGroup, upsertTopic, upsertCmt, notify, audit } = useApp();
  const [f, setF] = useState(null);
  useEffect(()=>{ setF(edit?edit.item:null); }, [edit]);
  if(!edit || !f) return null;
  const set = (k,v) => setF(prev=>({...prev,[k]:v}));
  const save = async () => {
    let ok=false;
    if(edit.type==='groups'){ if(!f.ten_group) return notify('Nhập tên group','warn'); ok=await upsertGroup(f); }
    if(edit.type==='topics'){ if(!f.chu_de) return notify('Nhập chủ đề','warn'); ok=await upsertTopic(f); }
    if(edit.type==='cmts'){ if(!f.noi_dung_goi_y) return notify('Nhập nội dung gợi ý','warn'); ok=await upsertCmt(f); }
    if(ok){ notify('Đã lưu'); onClose(); }
  };
  return <Modal open={!!edit} onClose={onClose} title={(f.id?'Sửa ':'Thêm ')+({groups:'group',topics:'chủ đề/nội dung',cmts:'gợi ý cmt'}[edit.type])}>
    {edit.type==='groups' && <>
      <Field label="Tên group" required><Input value={f.ten_group} onChange={e=>set('ten_group',e.target.value)}/></Field>
      <Field label="Link"><Input value={f.link} onChange={e=>set('link',e.target.value)}/></Field>
      <div className="grid grid-cols-2 gap-2">
        <Field label="Loại"><Select value={f.loai} onChange={e=>set('loai',e.target.value)}>{GROUP_LOAI.map(x=><option key={x}>{x}</option>)}</Select></Field>
        <Field label="Số member"><Input type="number" className="no-spin" value={f.so_member} onChange={e=>set('so_member',Number(e.target.value))}/></Field>
      </div>
      <PriSwitch value={!!f.uu_tien} onChange={v=>set('uu_tien',v)} hint="Yêu cầu Sales ưu tiên seeding group mục tiêu này"/>
    </>}
    {edit.type==='topics' && <>
      <Field label="Chủ đề" required><Input value={f.chu_de} onChange={e=>set('chu_de',e.target.value)}/></Field>
      <Field label="Nội dung / brief"><Textarea rows="5" value={f.noi_dung} onChange={e=>set('noi_dung',e.target.value)}/></Field>
      <div className="grid grid-cols-2 gap-2">
        <Field label="Loại bài"><Select value={f.loai_bai} onChange={e=>set('loai_bai',e.target.value)}>{LOAI_BAI.map(x=><option key={x}>{x}</option>)}</Select></Field>
        <Field label="Mục tiêu (nhãn lọc)"><Select value={f.muc_tieu} onChange={e=>set('muc_tieu',e.target.value)}><option value="">—</option>{MUC_TIEU.map(x=><option key={x}>{x}</option>)}</Select></Field>
      </div>
      <Field label="Tags (phẩy)"><Input value={(f.tags||[]).join(', ')} onChange={e=>set('tags',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))}/></Field>
      <PriSwitch value={!!f.uu_tien} onChange={v=>set('uu_tien',v)} hint="Yêu cầu Sales ưu tiên seeding tuyến nội dung này trong giai đoạn"/>
    </>}
    {edit.type==='cmts' && <>
      <Field label="Nội dung gợi ý" required><Textarea rows="3" value={f.noi_dung_goi_y} onChange={e=>set('noi_dung_goi_y',e.target.value)}/></Field>
      <div className="grid grid-cols-2 gap-2">
        <Field label="Tuyến"><Input value={f.tuyen} onChange={e=>set('tuyen',e.target.value)} placeholder="Trải nghiệm / Đặt câu hỏi…"/></Field>
        <Field label="Loại bài liên quan"><Select value={f.loai_bai||''} onChange={e=>set('loai_bai',e.target.value||null)}><option value="">—</option>{LOAI_BAI.map(x=><option key={x}>{x}</option>)}</Select></Field>
      </div>
      <Field label="Thứ tự"><Input type="number" className="no-spin" value={f.thu_tu||0} onChange={e=>set('thu_tu',Number(e.target.value))}/></Field>
    </>}
    <div className="flex gap-2 mt-2"><Btn variant="ghost" onClick={onClose}>Huỷ</Btn><Btn variant="gold" className="flex-1" onClick={save}>Lưu</Btn></div>
  </Modal>;
}
// Import từ Excel: dán TSV (copy trực tiếp từ Excel) hoặc CSV
function ImportBtn({tab}){
  const { upsertGroup, upsertTopic, upsertCmt, notify } = useApp();
  const [open, setOpen] = useState(false);
  const [txt, setTxt] = useState('');
  const cols = {
    groups:'ten_group | link | loai | so_member',
    topics:'chu_de | noi_dung | loai_bai | muc_tieu | tags(phẩy)',
    cmts:'noi_dung_goi_y | tuyen | loai_bai | thu_tu',
  }[tab];
  const doImport = async () => {
    const lines = txt.split('\n').map(l=>l.trim()).filter(Boolean);
    let n=0;
    for(const line of lines){
      const c = line.split('\t').length>1 ? line.split('\t') : line.split(',');
      const g = i => (c[i]||'').trim();
      if(tab==='groups'){ if(!g(0))continue; await upsertGroup({ten_group:g(0),link:g(1),loai:g(2)||GROUP_LOAI[0],so_member:Number(g(3))||0,active:true,uu_tien:false}); n++; }
      if(tab==='topics'){ if(!g(0))continue; await upsertTopic({chu_de:g(0),noi_dung:g(1),loai_bai:g(2)||LOAI_BAI[0],muc_tieu:g(3)||'',tags:g(4)?g(4).split(/[;,]/).map(s=>s.trim()):[],active:true,uu_tien:false}); n++; }
      if(tab==='cmts'){ if(!g(0))continue; await upsertCmt({noi_dung_goi_y:g(0),tuyen:g(1)||'',loai_bai:g(2)||null,thu_tu:Number(g(3))||0,active:true}); n++; }
    }
    notify('Đã import '+n+' dòng'); setTxt(''); setOpen(false);
  };
  return <>
    <Btn variant="ghost" onClick={()=>setOpen(true)}>⬇ Import Excel</Btn>
    <Modal open={open} onClose={()=>setOpen(false)} title="Import từ Excel" wide>
      <p className="text-sm text-slate-500 mb-2">Copy các cột từ Excel rồi dán vào ô dưới (mỗi dòng 1 mục). Thứ tự cột:</p>
      <div className="text-xs font-mono bg-slate-100 rounded-lg p-2 mb-2">{cols}</div>
      <Textarea rows="8" value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Dán dữ liệu tại đây…"/>
      <div className="flex gap-2 mt-3"><Btn variant="ghost" onClick={()=>setOpen(false)}>Huỷ</Btn><Btn variant="gold" className="flex-1" onClick={doImport}>Import</Btn></div>
    </Modal>
  </>;
}

function MktQueue(){
  const { db, reviewPost, reviewCmtSeed, notify } = useApp();
  const [tab, setTab] = useState('post');
  const [sel, setSel] = useState({}); // id->true để duyệt hàng loạt
  const [rejFor, setRejFor] = useState(null);
  const [rejTxt, setRejTxt] = useState('');

  const postItems = db.post_seedings.filter(p=>p.trang_thai===ST.CHO_DUYET);
  const cmtMine   = db.cmt_seedings.filter(c=>c.trang_thai===ST.CHO_DUYET && c.loai===CMT_LOAI.MINH_DANG);
  const cmtDao    = db.cmt_seedings.filter(c=>c.trang_thai===ST.CHO_DUYET && c.loai===CMT_LOAI.DAO);

  const approve = async (item) => {
    const ok = item._t==='post' ? await reviewPost(item.id, ST.DAT) : await reviewCmtSeed(item.id, ST.DAT);
    if(ok) notify('✅ Đã duyệt Đạt — tự tính tiền');
  };
  const reject = async () => {
    if(!rejTxt.trim()) return notify('Nhập lý do','warn');
    const item = rejFor;
    const ok = item._t==='post' ? await reviewPost(item.id, ST.KHONG_DAT, rejTxt.trim()) : await reviewCmtSeed(item.id, ST.KHONG_DAT, rejTxt.trim());
    if(ok){ notify('Đã trả về Sales sửa'); setRejFor(null); setRejTxt(''); }
  };

  const curItems = (tab==='post'?postItems.map(x=>({...x,_t:'post'})):tab==='mine'?cmtMine.map(x=>({...x,_t:'cmt'})):cmtDao.map(x=>({...x,_t:'cmt'})));
  const selIds = Object.keys(sel).filter(k=>sel[k]);
  const bulkApprove = async () => {
    for(const i of curItems.filter(i=>sel[i.id])) await approve(i);
    setSel({});
  };

  return <div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <h2 className="text-lg font-bold text-ink">✅ Hàng chờ nghiệm thu</h2>
      {selIds.length>0 && <Btn variant="ok" onClick={bulkApprove}>Duyệt {selIds.length} mục đã chọn</Btn>}
    </div>
    <Tabs active={tab} onChange={t=>{setTab(t);setSel({});}} tabs={[
      {key:'post', label:'POST', count:postItems.length},
      {key:'mine', label:'CMT mình đăng', count:cmtMine.length},
      {key:'dao', label:'CMT dạo', count:cmtDao.length},
    ]}/>

    {curItems.length===0 ? <Empty>Không có mục nào chờ duyệt 🎉</Empty> :
      <div className="space-y-3">
        {curItems.map(item=><QueueCard key={item.id} item={item} checked={!!sel[item.id]}
          onCheck={()=>setSel(s=>({...s,[item.id]:!s[item.id]}))}
          onApprove={()=>approve(item)} onReject={()=>{setRejFor(item);setRejTxt('');}}/>)}
      </div>}

    <Modal open={!!rejFor} onClose={()=>setRejFor(null)} title="Lý do không đạt">
      <Field label="Nhập lý do (bắt buộc)" required><Textarea rows="3" value={rejTxt} onChange={e=>setRejTxt(e.target.value)} placeholder="VD: thiếu ảnh, sai group, link hỏng…"/></Field>
      <div className="flex gap-2"><Btn variant="ghost" onClick={()=>setRejFor(null)}>Huỷ</Btn><Btn variant="danger" className="flex-1" onClick={reject}>Trả về Sales</Btn></div>
    </Modal>
  </div>;
}
function QueueCard({item, checked, onCheck, onApprove, onReject}){
  const { db } = useApp();
  const sales = db.users.find(u=>u.id===item.sales_id);
  const topic = item._t==='post' ? db.content_topics.find(t=>t.id===item.topic_id) : null;
  const group = item._t==='post' ? db.groups.find(g=>g.id===item.group_id) : null;
  const sug = item.suggestion_id ? db.cmt_suggestions.find(s=>s.id===item.suggestion_id) : null;
  const tien = item._t==='post' ? tienPost(db.pricing) : tienCmt(db.pricing, item.so_cmt_seeding);
  const link = item._t==='post' ? item.link_bai : item.post_link;

  return <div className="bg-white rounded-2xl border border-slate-100 p-4">
    <div className="flex items-start gap-3">
      <input type="checkbox" checked={checked} onChange={onCheck} className="mt-1 w-4 h-4 accent-emerald-600"/>
      <div className="flex-1 min-w-0">
        <div className="flex items-center justify-between gap-2">
          <div className="text-sm font-semibold text-ink">{sales?.ho_ten||'—'}</div>
          <div className="text-xs text-slate-400">{fmtDate(item.created_at)}</div>
        </div>
        {topic && <div className="text-sm text-slate-700 mt-1">{topic.chu_de} <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">{topic.loai_bai}</span></div>}
        {group && <div className="text-xs text-slate-500">Group: {group.ten_group}</div>}
        {sug && <div className="text-xs text-slate-500 mt-0.5">Gợi ý: "{sug.noi_dung_goi_y.slice(0,60)}…"</div>}
        {link && <div className="text-xs mt-1 truncate"><a href={link} target="_blank" className="text-blue-500 underline">🔗 {link}</a></div>}
        <div className="flex gap-3 text-xs text-slate-500 mt-1">
          {item._t==='post' && <span>👍 {item.react} · 💬 {item.so_cmt_seeding} seed · {item.so_cmt_tu_nhien} tự nhiên</span>}
          {item._t==='cmt' && <span>💬 {item.so_cmt_seeding} cmt · 👍 {item.react}</span>}
        </div>
        {item.proofs && item.proofs.length>0 && <div className="flex gap-2 mt-2 flex-wrap">
          {item.proofs.map(p=><a key={p.id} href={p.image_url} target="_blank"><img src={p.image_url} className="w-16 h-16 object-cover rounded-lg border"/></a>)}
        </div>}
        <div className="flex items-center justify-between mt-3">
          <span className="text-xs text-slate-400">Nếu Đạt: <b className="text-emerald-600">{fmtVND(tien)}</b></span>
          <div className="flex gap-2">
            <Btn variant="danger" onClick={onReject}>Không đạt</Btn>
            <Btn variant="ok" onClick={onApprove}>Đạt ✓</Btn>
          </div>
        </div>
      </div>
    </div>
  </div>;
}

function allRows(db){
  const posts = db.post_seedings.map(p=>({
    ...p, _t:'POST',
    sales: db.users.find(u=>u.id===p.sales_id)?.ho_ten||'—',
    chu_de: db.content_topics.find(t=>t.id===p.topic_id)?.chu_de||'—',
    loai_bai: db.content_topics.find(t=>t.id===p.topic_id)?.loai_bai||'—',
    group: db.groups.find(g=>g.id===p.group_id)?.ten_group||'—',
    link: p.link_bai,
  }));
  const cmts = db.cmt_seedings.map(c=>({
    ...c, _t: c.loai===CMT_LOAI.MINH_DANG?'CMT_MINE':'CMT_DAO',
    sales: db.users.find(u=>u.id===c.sales_id)?.ho_ten||'—',
    sug: db.cmt_suggestions.find(s=>s.id===c.suggestion_id)?.noi_dung_goi_y||'—',
    link: c.post_link,
  }));
  return { posts, cmts };
}
function MktPayReport(){
  const { db } = useApp();
  const [tab, setTab] = useState('post');
  const [from, setFrom] = useState(''); const [to, setTo] = useState('');
  const [fSales, setFSales] = useState(''); const [fSt, setFSt] = useState('');
  const { posts, cmts } = allRows(db);
  const flt = r => inRangeOrAll(r.created_at,from,to) && (!fSales||r.sales_id===fSales) && (!fSt||r.trang_thai===fSt);
  function inRangeOrAll(iso,f,t){ if(!f&&!t) return true; return inRange(iso,f,t); }

  const exportCSV = () => {
    let rows, name;
    if(tab==='post'){ name='POST_SEEDING';
      rows=[['Ngày','Sales','Chủ đề','Loại bài','Group','Link','React','Cmt seeding','Cmt tự nhiên','Trạng thái','Thành tiền']];
      posts.filter(flt).forEach(r=>rows.push([fmtDay(r.created_at),r.sales,r.chu_de,r.loai_bai,r.group,r.link,r.react,r.so_cmt_seeding,r.so_cmt_tu_nhien,ST_LABEL[r.trang_thai],r.thanh_tien]));
    } else { const isMine=tab==='mine'; name=isMine?'CMT_MINH_DANG':'CMT_DAO';
      rows=[['Ngày','Sales','Link post','Gợi ý cmt','Số cmt','Số ảnh','Trạng thái','Thành tiền']];
      cmts.filter(c=> (isMine? c.loai===CMT_LOAI.MINH_DANG : c.loai===CMT_LOAI.DAO)).filter(flt).forEach(r=>rows.push([fmtDay(r.created_at),r.sales,r.link,r.sug,r.so_cmt_seeding,(r.proofs||[]).length,ST_LABEL[r.trang_thai],r.thanh_tien]));
    }
    download(name+'.csv', toCSV(rows));
  };

  return <div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <h2 className="text-lg font-bold text-ink">📄 Báo cáo thanh toán</h2>
      <Btn variant="gold" onClick={exportCSV}>⬆ Xuất Excel</Btn>
    </div>
    <div className="bg-white rounded-2xl border border-slate-100 p-3 flex flex-wrap gap-2 items-center">
      <DateRange from={from} to={to} setFrom={setFrom} setTo={setTo}/>
      <Select value={fSales} onChange={e=>setFSales(e.target.value)} className="max-w-[180px]"><option value="">Mọi Sales</option>{db.users.filter(u=>u.vai_tro===ROLES.SALES).map(u=><option key={u.id} value={u.id}>{u.ho_ten}</option>)}</Select>
      <Select value={fSt} onChange={e=>setFSt(e.target.value)} className="max-w-[160px]"><option value="">Mọi trạng thái</option>{Object.keys(ST_LABEL).map(s=><option key={s} value={s}>{ST_LABEL[s]}</option>)}</Select>
    </div>
    <Tabs active={tab} onChange={setTab} tabs={[{key:'post',label:'POST'},{key:'mine',label:'CMT mình đăng'},{key:'dao',label:'CMT dạo'}]}/>

    <div className="bg-white rounded-2xl border border-slate-100 overflow-auto">
      <table className="w-full text-sm min-w-[720px]">
        <thead className="bg-slate-50 text-xs text-slate-500 text-left">
          {tab==='post' ? <tr><Th>Ngày</Th><Th>Sales</Th><Th>Chủ đề</Th><Th>Loại bài</Th><Th>Group</Th><Th>Link</Th><Th r>React</Th><Th r>Cmt</Th><Th>Trạng thái</Th><Th r>Thành tiền</Th></tr>
            : <tr><Th>Ngày</Th><Th>Sales</Th><Th>Link post</Th><Th>Gợi ý cmt</Th><Th r>Số cmt</Th><Th>Ảnh</Th><Th>Trạng thái</Th><Th r>Thành tiền</Th></tr>}
        </thead>
        <tbody className="divide-y">
          {tab==='post' ? posts.filter(flt).sort(byDateDesc).map(r=><tr key={r.id} className="hover:bg-slate-50">
            <Td>{fmtDay(r.created_at)}</Td><Td>{r.sales}</Td><Td>{r.chu_de}</Td><Td>{r.loai_bai}</Td><Td>{r.group}</Td>
            <Td>{r.link?<a href={r.link} target="_blank" className="text-blue-500 underline">link</a>:'—'}</Td>
            <Td r>{r.react}</Td><Td r>{r.so_cmt_seeding}</Td><Td><Badge st={r.trang_thai}/></Td><Td r><b>{r.thanh_tien?fmtVND(r.thanh_tien):'—'}</b></Td>
          </tr>) : cmts.filter(c=>tab==='mine'?c.loai===CMT_LOAI.MINH_DANG:c.loai===CMT_LOAI.DAO).filter(flt).sort(byDateDesc).map(r=><tr key={r.id} className="hover:bg-slate-50">
            <Td>{fmtDay(r.created_at)}</Td><Td>{r.sales}</Td>
            <Td>{r.link?<a href={r.link} target="_blank" className="text-blue-500 underline">link</a>:'—'}</Td>
            <Td className="max-w-[220px] truncate">{r.sug}</Td><Td r>{r.so_cmt_seeding}</Td>
            <Td>{(r.proofs||[]).length? <span className="flex gap-1">{r.proofs.slice(0,3).map(p=><a key={p.id} href={p.image_url} target="_blank"><img src={p.image_url} className="w-8 h-8 object-cover rounded"/></a>)}</span> : '—'}</Td>
            <Td><Badge st={r.trang_thai}/></Td><Td r><b>{r.thanh_tien?fmtVND(r.thanh_tien):'—'}</b></Td>
          </tr>)}
        </tbody>
      </table>
      {((tab==='post'?posts.filter(flt):cmts.filter(c=>tab==='mine'?c.loai===CMT_LOAI.MINH_DANG:c.loai===CMT_LOAI.DAO).filter(flt)).length===0) && <Empty>Không có dữ liệu.</Empty>}
    </div>
  </div>;
}
const byDateDesc = (a,b)=>(b.created_at||'').localeCompare(a.created_at||'');
function Th({children, r}){ return <th className={"px-3 py-2 font-medium "+(r?'text-right':'')}>{children}</th>; }
function Td({children, r, className=''}){ return <td className={"px-3 py-2 "+(r?'text-right':'')+' '+className}>{children}</td>; }

/* ============================================================
   17. QUẢN LÝ TÀI KHOẢN (Marketing quyền cao nhất — duyệt tài khoản)
============================================================ */
function UserManagement(){
  const { db, me, createUser, updateUser, deleteUser, notify } = useApp();
  const [edit, setEdit] = useState(null);
  const blank = {ho_ten:'',email:'',password:'123456',vai_tro:ROLES.SALES,active:true};

  const activeMkt = db.users.filter(u=>u.active && u.vai_tro===ROLES.MARKETING).length;

  const setActive = (u, on) => {
    if(!on && u.id===me.id) return notify('Không thể tự tắt tài khoản của mình','warn');
    if(!on && u.vai_tro===ROLES.MARKETING && activeMkt<=1) return notify('Phải còn ít nhất 1 Marketing đang hoạt động','warn');
    updateUser(u.id, {active:on});
  };
  const setRole = (u, role) => {
    if(u.id===me.id && role!==ROLES.MARKETING && u.vai_tro===ROLES.MARKETING && activeMkt<=1) return notify('Phải còn ít nhất 1 Marketing','warn');
    updateUser(u.id, {vai_tro:role});
  };
  const remove = async (u) => {
    if(u.id===me.id) return notify('Không thể xoá tài khoản của mình','warn');
    if(u.vai_tro===ROLES.MARKETING && activeMkt<=1) return notify('Phải còn ít nhất 1 Marketing','warn');
    if(!confirm('Xoá tài khoản '+u.ho_ten+'?')) return;
    if(await deleteUser(u.id)) notify('Đã xoá');
  };
  const save = async () => {
    if(!edit.ho_ten) return notify('Nhập họ tên','warn');
    const key=(edit.email||'').trim().toLowerCase();
    if(!key) return notify('Nhập email','warn');
    if(!edit.id && !edit.password) return notify('Nhập mật khẩu','warn');
    let ok;
    if(edit.id) ok = await updateUser(edit.id, {ho_ten:edit.ho_ten, vai_tro:edit.vai_tro, active:edit.active, ...(edit.password?{password:edit.password}:{})});
    else ok = await createUser({ho_ten:edit.ho_ten, email:key, password:edit.password, vai_tro:edit.vai_tro, active:edit.active});
    if(ok){ notify(edit.id?'Đã lưu':'Đã tạo tài khoản'); setEdit(null); }
  };

  return <div className="space-y-4">
    <div className="flex items-center justify-between">
      <h2 className="text-lg font-bold text-ink">👥 Quản lý tài khoản</h2>
      <Btn variant="gold" onClick={()=>setEdit({...blank})}>＋ Tạo tài khoản</Btn>
    </div>
    <div className="bg-gold/10 border border-gold/30 rounded-2xl p-3 text-xs text-gold-dark">
      Marketing tạo & cấp tài khoản cho Sales và Kế toán — gửi <b>email + mật khẩu</b> để họ đăng nhập. Họ không tự đăng ký.
    </div>

    <div className="bg-white rounded-2xl border border-slate-100 divide-y">
      {db.users.map(u=><div key={u.id} className={"p-3 flex items-center gap-3 "+(u.active?'':'opacity-50')}>
        <div className="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600">{u.ho_ten[0]}</div>
        <div className="flex-1 min-w-0">
          <div className="text-sm font-medium text-ink truncate">{u.ho_ten}{u.id===me.id && <span className="text-[10px] text-slate-400"> (bạn)</span>}</div>
          <div className="text-xs text-slate-400 truncate">{u.email}</div>
        </div>
        <Select value={u.vai_tro} onChange={e=>setRole(u,e.target.value)} className="max-w-[130px] py-1 text-xs">
          {Object.values(ROLES).map(r=><option key={r} value={r}>{ROLE_LABEL[r]}</option>)}
        </Select>
        <Toggle on={u.active} onClick={()=>setActive(u,!u.active)} labels={['Bật','Tắt']}/>
        <button onClick={()=>setEdit(u)} className="text-xs text-blue-500 hover:underline">Sửa</button>
        <button onClick={()=>remove(u)} className="text-xs text-rose-500 hover:underline">Xoá</button>
      </div>)}
    </div>

    <Modal open={!!edit} onClose={()=>setEdit(null)} title={edit&&edit.id?'Sửa tài khoản':'Tạo tài khoản'}>
      {edit && <>
        <Field label="Họ tên" required><Input value={edit.ho_ten} onChange={e=>setEdit({...edit,ho_ten:e.target.value})}/></Field>
        <Field label="Email" required hint={edit.id?'Không đổi được email sau khi tạo':''}><Input type="email" value={edit.email} disabled={!!edit.id} onChange={e=>setEdit({...edit,email:e.target.value})}/></Field>
        <Field label="Mật khẩu" hint={edit.id?'Để trống nếu không đổi mật khẩu':'Người dùng đăng nhập bằng email + mật khẩu này'}><Input value={edit.password||''} placeholder={edit.id?'••••••':''} onChange={e=>setEdit({...edit,password:e.target.value})}/></Field>
        <Field label="Vai trò"><Select value={edit.vai_tro} onChange={e=>setEdit({...edit,vai_tro:e.target.value})}>{Object.values(ROLES).map(r=><option key={r} value={r}>{ROLE_LABEL[r]}</option>)}</Select></Field>
        <div className="flex gap-2 mt-2"><Btn variant="ghost" onClick={()=>setEdit(null)}>Huỷ</Btn><Btn variant="gold" className="flex-1" onClick={save}>{edit.id?'Lưu':'Tạo & cấp'}</Btn></div>
      </>}
    </Modal>
  </div>;
}

/* ============================================================
   19. ADMIN — BẢNG LƯƠNG + KỲ THANH TOÁN
============================================================ */
function AdminPayroll(){
  const { db, markPaid:apiMarkPaid, notify } = useApp();
  const [ky, setKy] = useState('');
  const { posts, cmts } = allRows(db);
  const all = [...posts, ...cmts];
  const kyList = [...new Set(all.filter(x=>x.trang_thai===ST.DAT||x.trang_thai===ST.DA_CHI).map(x=>x.ky_thanh_toan||kyOf(x.created_at)))].sort().reverse();

  const flt = x => (x.trang_thai===ST.DAT||x.trang_thai===ST.DA_CHI) && (!ky || (x.ky_thanh_toan||kyOf(x.created_at))===ky);

  // gom theo sales
  const bySales = {};
  db.users.filter(u=>u.vai_tro===ROLES.SALES).forEach(u=>{ bySales[u.id]={u, postDat:0,tienPost:0,cmtDat:0,tienCmt:0,daChi:0,conLai:0}; });
  posts.filter(flt).forEach(p=>{ const r=bySales[p.sales_id]; if(!r)return; r.postDat++; r.tienPost+=p.thanh_tien; if(p.trang_thai===ST.DA_CHI)r.daChi+=p.thanh_tien; else r.conLai+=p.thanh_tien; });
  cmts.filter(flt).forEach(c=>{ const r=bySales[c.sales_id]; if(!r)return; r.cmtDat++; r.tienCmt+=c.thanh_tien; if(c.trang_thai===ST.DA_CHI)r.daChi+=c.thanh_tien; else r.conLai+=c.thanh_tien; });
  const rows = Object.values(bySales).filter(r=>r.postDat||r.cmtDat);

  const markPaid = async (salesId) => {
    if(!confirm('Đánh dấu ĐÃ CHI tất cả item Đạt của Sales này trong kỳ '+(ky||'tất cả')+'?')) return;
    if(await apiMarkPaid(salesId, ky||null)) notify('Đã đánh dấu Đã chi');
  };
  const exportPayroll = () => {
    const r=[['Sales','Post đạt','Tiền post','Cmt đạt','Tiền cmt','Tổng phải trả','Đã chi','Còn lại']];
    rows.forEach(x=>r.push([x.u.ho_ten,x.postDat,x.tienPost,x.cmtDat,x.tienCmt,x.tienPost+x.tienCmt,x.daChi,x.conLai]));
    download('BANG_LUONG_'+(ky||'ALL')+'.csv', toCSV(r));
  };

  const tong = rows.reduce((a,x)=>({tt:a.tt+x.tienPost+x.tienCmt, chi:a.chi+x.daChi, con:a.con+x.conLai}),{tt:0,chi:0,con:0});

  return <div className="space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <h2 className="text-lg font-bold text-ink">🧾 Bảng lương</h2>
      <div className="flex gap-2 items-center">
        <Select value={ky} onChange={e=>setKy(e.target.value)}><option value="">Tất cả kỳ</option>{kyList.map(k=><option key={k}>{k}</option>)}</Select>
        <Btn variant="gold" onClick={exportPayroll}>⬆ Xuất Excel</Btn>
      </div>
    </div>
    <div className="grid grid-cols-3 gap-3">
      <Stat label="Tổng phải trả" value={fmtVND(tong.tt)}/>
      <Stat label="Đã chi" value={fmtVND(tong.chi)} color="text-indigo-600"/>
      <Stat label="Còn lại" value={fmtVND(tong.con)} color="text-rose-600"/>
    </div>
    <div className="bg-white rounded-2xl border border-slate-100 overflow-auto">
      <table className="w-full text-sm min-w-[720px]">
        <thead className="bg-slate-50 text-xs text-slate-500 text-left"><tr>
          <Th>Sales</Th><Th r>Post đạt</Th><Th r>Tiền post</Th><Th r>Cmt đạt</Th><Th r>Tiền cmt</Th><Th r>Tổng phải trả</Th><Th r>Đã chi</Th><Th r>Còn lại</Th><Th></Th>
        </tr></thead>
        <tbody className="divide-y">
          {rows.length===0 ? <tr><td colSpan="9"><Empty>Chưa có item đạt trong kỳ.</Empty></td></tr> :
            rows.map(x=><tr key={x.u.id} className="hover:bg-slate-50">
              <Td>{x.u.ho_ten}</Td><Td r>{x.postDat}</Td><Td r>{fmtVND(x.tienPost)}</Td><Td r>{x.cmtDat}</Td><Td r>{fmtVND(x.tienCmt)}</Td>
              <Td r><b>{fmtVND(x.tienPost+x.tienCmt)}</b></Td><Td r className="text-indigo-600">{fmtVND(x.daChi)}</Td><Td r className="text-rose-600">{fmtVND(x.conLai)}</Td>
              <Td>{x.conLai>0 && <Btn variant="soft" onClick={()=>markPaid(x.u.id)}>Đã chi</Btn>}</Td>
            </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}
